<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AsiaTravelPlan | Coming Soon</title>
    <meta name="description" content="AsiaTravelPlan is launching soon." />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="AsiaTravelPlan | Coming Soon" />
    <meta property="og:description" content="AsiaTravelPlan is launching soon." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="placeholder-assets/happy_tourists.webp" />
    <meta name="theme-color" content="" />
    <link rel="icon" href="placeholder-assets/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="stylesheet" href="placeholder-assets/styles.css" />
    <script>
      window.addEventListener("load", () => {
        const meta = document.querySelector('meta[name="theme-color"]');
        const themeColor = getComputedStyle(document.documentElement).getPropertyValue("--bg").trim();
        if (meta && themeColor) meta.setAttribute("content", themeColor);
      });
    </script>
  </head>
  <body>
    <main class="simple-shell">
      <img class="simple-logo" src="placeholder-assets/logo-asiatravelplan.svg" alt="AsiaTravelPlan" width="320" height="76" />
      <div class="simple-visual-frame">
        <img class="simple-visual" src="placeholder-assets/happy_tourists.webp" alt="Travelers enjoying a guided trip in Southeast Asia" width="1400" height="933" />
      </div>
      <p class="simple-status">Coming Soon</p>
    </main>
    <a class="simple-login-link" href="/auth/login?return_to=%2Fapp-home.html&prompt=login">Log into backend</a>
  </body>
</html>
