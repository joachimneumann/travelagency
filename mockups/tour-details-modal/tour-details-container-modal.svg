<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1040" viewBox="0 0 1440 1040" role="img" aria-labelledby="title desc">
  <title id="title">Tour details side modal mockup</title>
  <desc id="desc">A desktop mockup showing a container-width modal. The selected tour card stays at the top-left in the same size, with its Details button changed to X Close. A narrower details panel appears to the right.</desc>
  <style>
    :root {
      color-scheme: light;
    }
    text {
      font-family: Inter, Arial, sans-serif;
      fill: #18323c;
      letter-spacing: 0;
    }
    .page-bg {
      fill: #f6f2ea;
    }
    .surface {
      fill: #fff;
    }
    .modal-bg {
      fill: #e7f0e2;
    }
    .overlay {
      fill: #0e1c20;
      opacity: 0.58;
    }
    .container-guide {
      fill: none;
      stroke: #2f8373;
      stroke-width: 2;
      stroke-dasharray: 10 8;
    }
    .soft-line {
      stroke: #dfd8cb;
      stroke-width: 1.5;
    }
    .card-shadow {
      filter: drop-shadow(0 20px 34px rgba(23, 45, 53, 0.16));
    }
    .modal-shadow {
      filter: drop-shadow(0 34px 70px rgba(20, 35, 42, 0.34));
    }
    .accent {
      fill: #318878;
    }
    .accent-dark {
      fill: #2a7a6c;
    }
    .accent-text {
      fill: #2a7a6c;
    }
    .salmon {
      fill: #ff6a59;
    }
    .muted {
      fill: #61717a;
    }
    .white {
      fill: #fff;
    }
    .h1 {
      font-size: 44px;
      font-weight: 850;
    }
    .h2 {
      font-size: 34px;
      font-weight: 850;
    }
    .h3 {
      font-size: 24px;
      font-weight: 850;
    }
    .body {
      font-size: 18px;
      fill: #233842;
    }
    .small {
      font-size: 15px;
      fill: #61717a;
      font-weight: 700;
    }
    .tiny-label {
      font-size: 16px;
      font-weight: 850;
      fill: #ff6a59;
      letter-spacing: 3px;
    }
    .button-text {
      font-size: 17px;
      font-weight: 850;
    }
    .card-title {
      font-size: 31px;
      font-weight: 900;
    }
    .card-meta {
      font-size: 17px;
      font-weight: 800;
      fill: #61717a;
    }
    .card-copy {
      font-size: 17px;
      fill: #233842;
    }
    .guide-label {
      font-size: 16px;
      font-weight: 800;
      fill: #2f8373;
    }
  </style>

  <rect class="page-bg" width="1440" height="1040"/>

  <g id="page-background">
    <rect class="surface" x="0" y="0" width="1440" height="82"/>
    <rect class="container-guide" x="160" y="16" width="1120" height="50" rx="6"/>
    <text class="guide-label" x="160" y="106">.container width: min(1120px, 92vw)</text>

    <rect x="178" y="26" width="152" height="30" rx="6" fill="#18323c"/>
    <text class="white" x="197" y="47" font-size="16" font-weight="850">AsiaTravelPlan</text>
    <text class="muted" x="850" y="47" font-size="17">Why us</text>
    <text class="muted" x="930" y="47" font-size="17">About us</text>
    <text class="muted" x="1033" y="47" font-size="17">FAQ</text>
    <text class="muted" x="1085" y="47" font-size="17">Contact</text>

    <rect x="0" y="82" width="1440" height="210" fill="#d7e6df"/>
    <rect x="0" y="82" width="1440" height="210" fill="url(#heroPattern)" opacity="0.42"/>
    <rect x="0" y="82" width="1440" height="210" fill="#0f322e" opacity="0.26"/>
    <text class="h2 white" x="160" y="178">Private holidays in Vietnam</text>
    <rect x="160" y="207" width="520" height="54" rx="12" fill="#fff" opacity="0.92"/>
    <text class="body" x="185" y="240">All destinations</text>
    <line x1="420" y1="219" x2="420" y2="249" stroke="#d8d0c4"/>
    <text class="body" x="445" y="240">All travel styles</text>

    <text class="h2" x="160" y="358">Featured tours you can tailor</text>
    <text class="muted" x="160" y="388" font-size="18">Clicking Details opens the popup; the selected card stays visible at the top-left.</text>

    <g opacity="0.72">
      <g transform="translate(160 430)">
        <rect class="surface card-shadow" width="350" height="540" rx="22"/>
        <rect x="16" y="16" width="318" height="292" rx="15" fill="#8fc6da"/>
        <path d="M16 236 C72 200, 126 286, 190 226 S282 202, 334 250 L334 308 L16 308 Z" fill="#4e956d" opacity="0.72"/>
        <text class="h3" x="28" y="356">Classic Vietnam</text>
        <text class="card-meta" x="28" y="388">7 days | Vietnam</text>
        <rect x="28" y="468" width="130" height="48" rx="15" fill="#fff" stroke="#318878" stroke-width="2"/>
        <text class="button-text accent-text" x="64" y="499">Details</text>
        <rect class="accent" x="174" y="468" width="148" height="48" rx="15"/>
        <text class="button-text white" x="208" y="499">Quote</text>
      </g>

      <g transform="translate(545 430)">
        <rect class="surface card-shadow" width="350" height="540" rx="22"/>
        <rect x="16" y="16" width="318" height="292" rx="15" fill="#d2b178"/>
        <path d="M16 220 C80 178, 120 270, 186 212 S270 168, 334 230 L334 308 L16 308 Z" fill="#967456" opacity="0.7"/>
        <text class="h3" x="28" y="356">Southern Vietnam</text>
        <text class="card-meta" x="28" y="388">8 days | Vietnam</text>
        <rect x="28" y="468" width="130" height="48" rx="15" fill="#eef8f4" stroke="#318878" stroke-width="3"/>
        <text class="button-text accent-text" x="64" y="499">Details</text>
        <rect class="accent" x="174" y="468" width="148" height="48" rx="15"/>
        <text class="button-text white" x="208" y="499">Quote</text>
      </g>

      <g transform="translate(930 430)">
        <rect class="surface card-shadow" width="350" height="540" rx="22"/>
        <rect x="16" y="16" width="318" height="292" rx="15" fill="#7f9fc4"/>
        <path d="M16 230 C82 184, 138 260, 202 210 S286 188, 334 236 L334 308 L16 308 Z" fill="#557a9f" opacity="0.76"/>
        <text class="h3" x="28" y="356">Hoi An Escape</text>
        <text class="card-meta" x="28" y="388">5 days | Vietnam</text>
        <rect x="28" y="468" width="130" height="48" rx="15" fill="#fff" stroke="#318878" stroke-width="2"/>
        <text class="button-text accent-text" x="64" y="499">Details</text>
        <rect class="accent" x="174" y="468" width="148" height="48" rx="15"/>
        <text class="button-text white" x="208" y="499">Quote</text>
      </g>
    </g>
  </g>

  <rect class="overlay" width="1440" height="1040"/>

  <g id="container-width-modal" class="modal-shadow">
    <rect class="modal-bg" x="160" y="122" width="1120" height="810" rx="26"/>
    <rect class="container-guide" x="160" y="122" width="1120" height="810" rx="26"/>
    <text class="guide-label" x="855" y="106">Popup keeps .container width</text>

    <g id="selected-card" transform="translate(186 154)">
      <rect class="surface card-shadow" width="350" height="590" rx="24"/>
      <rect x="18" y="18" width="314" height="318" rx="16" fill="#91cde6"/>
      <rect x="18" y="18" width="314" height="318" rx="16" fill="url(#cardSky)" opacity="0.78"/>
      <path d="M18 255 C72 218, 128 306, 192 248 S280 214, 332 268 L332 336 L18 336 Z" fill="#4b946f" opacity="0.88"/>
      <path d="M18 280 C82 246, 128 330, 196 278 S286 248, 332 292 L332 336 L18 336 Z" fill="#2e7b5b" opacity="0.45"/>
      <rect x="34" y="36" width="86" height="44" rx="22" fill="#fff" opacity="0.93"/>
      <text x="52" y="64" font-size="22" font-weight="900" fill="#18323c">1 / 16</text>
      <rect x="256" y="286" width="72" height="48" rx="24" fill="#fff"/>
      <text x="276" y="316" font-size="17" font-weight="900" fill="#318878">8D7N</text>

      <text class="card-title" x="18" y="385">Southern Vietnam</text>
      <text class="card-title" x="18" y="423">revealed</text>
      <text class="card-meta" x="18" y="455">8 days | Vietnam | Private tour</text>
      <text class="card-copy" x="18" y="490">Follow Saigon's stories to the Mekong,</text>
      <text class="card-copy" x="18" y="516">Mui Ne's dunes and Da Lat's cool highlands.</text>

      <g transform="translate(18 536)">
        <rect x="0" y="0" width="132" height="54" rx="17" fill="#fff" stroke="#318878" stroke-width="2"/>
        <text class="button-text accent-text" x="31" y="34">X Close</text>
        <rect class="accent" x="148" y="0" width="166" height="54" rx="17"/>
        <text class="button-text white" x="181" y="34">Get a Quote</text>
      </g>
    </g>

    <g id="narrow-details" transform="translate(570 154)">
      <rect class="surface" width="682" height="744" rx="24"/>
      <text class="tiny-label" x="30" y="48">TOUR DETAILS</text>
      <text class="h1" x="30" y="102">Southern Vietnam revealed</text>

      <g transform="translate(30 154)">
        <text class="small" x="0" y="0">Duration</text>
        <text class="body" x="0" y="48">8 days</text>
        <text class="small" x="150" y="0">Destination</text>
        <text class="body" x="150" y="48">Vietnam</text>
        <text class="small" x="330" y="0">Travel styles</text>
        <rect x="330" y="22" width="82" height="38" rx="19" fill="#eef3ff"/>
        <text x="351" y="47" font-size="17" fill="#0a5cae">Budget</text>
        <rect x="426" y="22" width="86" height="38" rx="19" fill="#eef3ff"/>
        <text x="444" y="47" font-size="17" fill="#0a5cae">Culture</text>
        <rect x="526" y="22" width="76" height="38" rx="19" fill="#eef3ff"/>
        <text x="545" y="47" font-size="17" fill="#0a5cae">Family</text>
      </g>

      <text class="small" x="30" y="286">Experience highlights</text>
      <g transform="translate(50 328)">
        <g>
          <rect x="22" y="0" width="30" height="30" rx="4" fill="none" stroke="#245b55" stroke-width="2"/>
          <path d="M16 30h48M28 0v-8h18v8M56 8h18v22H56" fill="none" stroke="#245b55" stroke-width="2"/>
          <text class="body" x="0" y="72">Shopping and</text>
          <text class="body" x="12" y="99">Souvenirs</text>
        </g>
        <g transform="translate(165 0)">
          <circle cx="42" cy="8" r="9" fill="none" stroke="#245b55" stroke-width="2"/>
          <circle cx="22" cy="21" r="8" fill="none" stroke="#245b55" stroke-width="2"/>
          <circle cx="62" cy="21" r="8" fill="none" stroke="#245b55" stroke-width="2"/>
          <path d="M8 56c5-18 24-20 34-8c10-12 29-10 34 8M26 42h32" fill="none" stroke="#245b55" stroke-width="2"/>
          <text class="body" x="-6" y="72">Family Friendly</text>
          <text class="body" x="8" y="99">Activities</text>
        </g>
        <g transform="translate(340 0)">
          <path d="M10 8l32-12l32 12v44L42 40L10 52z" fill="none" stroke="#245b55" stroke-width="2"/>
          <path d="M42-4v44M32 17c0-7 5-12 11-12s11 5 11 12c0 8-11 20-11 20S32 25 32 17z" fill="none" stroke="#245b55" stroke-width="2"/>
          <text class="body" x="-8" y="72">Local Experiences</text>
        </g>
        <g transform="translate(520 0)">
          <path d="M12 22h54c-4 24-18 34-37 34S-4 46 12 22zM22 16h36M30 8c0-8 10-8 10-16M48 8c0-8 10-8 10-16" fill="none" stroke="#245b55" stroke-width="2"/>
          <text class="body" x="-26" y="72">Delicious Cuisine</text>
        </g>
      </g>

      <g transform="translate(30 500)">
        <rect x="0" y="0" width="292" height="48" rx="14" fill="#fff" stroke="#318878" stroke-width="2"/>
        <text class="button-text accent-text" x="65" y="31">Overview (one-pager)</text>
        <text class="body" x="348" y="31">PDF overview of this tour</text>

        <rect x="0" y="70" width="292" height="48" rx="14" fill="#fff" stroke="#318878" stroke-width="2"/>
        <text class="button-text accent-text" x="48" y="101">Day-by-Day Travel Plan</text>
        <text class="body" x="348" y="101">Full activity-by-activity PDF</text>
      </g>

      <line x1="30" y1="650" x2="652" y2="650" class="soft-line"/>
      <g transform="translate(30 672)">
        <rect x="0" y="0" width="190" height="52" rx="15" fill="#fff" stroke="#dfebef" stroke-width="2"/>
        <text class="button-text" x="58" y="33">Itinerary</text>
        <rect x="206" y="0" width="222" height="52" rx="15" fill="#fff" stroke="#dfebef" stroke-width="2"/>
        <text class="button-text" x="237" y="33">Customize this Trip</text>
        <rect class="accent" x="444" y="0" width="178" height="52" rx="15"/>
        <text class="button-text white" x="484" y="33">Get a Quote</text>
      </g>
    </g>
  </g>

  <g id="notes">
    <rect x="160" y="956" width="1120" height="54" rx="10" fill="#18323c"/>
    <text class="white" x="186" y="990" font-size="18" font-weight="750">Updated behavior: selected card remains full-size at top-left; its Details button becomes X Close; details render to the right in a narrower panel.</text>
  </g>

  <defs>
    <pattern id="heroPattern" width="180" height="120" patternUnits="userSpaceOnUse">
      <path d="M0 88 C48 58, 90 104, 140 70 S210 52, 260 82" fill="none" stroke="#fff" stroke-width="18" opacity="0.42"/>
      <path d="M-20 116 C35 82, 96 132, 158 92 S236 72, 290 108" fill="none" stroke="#fff" stroke-width="12" opacity="0.28"/>
    </pattern>
    <linearGradient id="cardSky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#6fbce2"/>
      <stop offset="0.55" stop-color="#dff0ef"/>
      <stop offset="1" stop-color="#f6d4ae"/>
    </linearGradient>
  </defs>
</svg>
