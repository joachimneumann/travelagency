<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1040" viewBox="0 0 1440 1040" role="img" aria-labelledby="title desc">
  <title id="title">Tour details modal mockup</title>
  <desc id="desc">A desktop mockup showing tour cards dimmed behind a fixed modal. The modal panel uses the same width as the page container.</desc>
  <style>
    :root {
      color-scheme: light;
    }
    text {
      font-family: Inter, Arial, sans-serif;
      fill: #203239;
    }
    .page-bg {
      fill: #f6f2ea;
    }
    .surface {
      fill: #ffffff;
    }
    .muted-surface {
      fill: #f2eee6;
    }
    .line {
      stroke: #d9d0c2;
      stroke-width: 1.5;
    }
    .soft-line {
      stroke: #e6ded1;
      stroke-width: 1;
    }
    .accent {
      fill: #0f7b6c;
    }
    .accent-stroke {
      stroke: #0f7b6c;
      stroke-width: 2;
    }
    .container-guide {
      fill: none;
      stroke: #0f7b6c;
      stroke-width: 2;
      stroke-dasharray: 10 8;
    }
    .container-label {
      fill: #0f7b6c;
      font-size: 17px;
      font-weight: 700;
    }
    .caption {
      fill: #68777a;
      font-size: 17px;
    }
    .tiny {
      fill: #68777a;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0;
    }
    .h1 {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0;
    }
    .h2 {
      font-size: 27px;
      font-weight: 800;
      letter-spacing: 0;
    }
    .h3 {
      font-size: 21px;
      font-weight: 800;
      letter-spacing: 0;
    }
    .body {
      fill: #405156;
      font-size: 16px;
    }
    .button-text {
      font-size: 15px;
      font-weight: 800;
    }
    .shadow {
      filter: drop-shadow(0 24px 42px rgba(28, 48, 56, 0.18));
    }
    .modal-shadow {
      filter: drop-shadow(0 34px 70px rgba(20, 35, 42, 0.34));
    }
    .white-text {
      fill: #ffffff;
    }
    .overlay {
      fill: rgba(14, 28, 32, 0.62);
    }
  </style>

  <rect class="page-bg" width="1440" height="1040"/>

  <g id="page">
    <rect class="surface" x="0" y="0" width="1440" height="82"/>
    <rect class="container-guide" x="160" y="16" width="1120" height="50" rx="6"/>
    <text class="container-label" x="160" y="105">.container width: min(1120px, 92vw)</text>

    <rect x="178" y="26" width="152" height="30" rx="6" fill="#203239"/>
    <text class="white-text" x="197" y="47" font-size="16" font-weight="800">AsiaTravelPlan</text>
    <text class="caption" x="850" y="47">Why us</text>
    <text class="caption" x="930" y="47">About us</text>
    <text class="caption" x="1033" y="47">FAQ</text>
    <text class="caption" x="1085" y="47">Contact</text>
    <rect x="1184" y="23" width="76" height="36" rx="18" fill="#f1ede4" stroke="#ddd2c4"/>
    <text x="1207" y="46" font-size="15" font-weight="800" fill="#405156">EN</text>

    <rect x="0" y="82" width="1440" height="210" fill="#d7e6df"/>
    <rect x="0" y="82" width="1440" height="210" fill="url(#heroPattern)" opacity="0.42"/>
    <rect x="0" y="82" width="1440" height="210" fill="rgba(15, 50, 46, 0.26)"/>
    <text class="h1 white-text" x="160" y="178">Private holidays in Vietnam</text>
    <rect x="160" y="207" width="520" height="54" rx="12" fill="rgba(255,255,255,0.92)"/>
    <text class="body" x="185" y="240">All destinations</text>
    <line x1="420" y1="219" x2="420" y2="249" stroke="#d8d0c4"/>
    <text class="body" x="445" y="240">All travel styles</text>

    <text class="h2" x="160" y="358">Featured tours you can tailor</text>
    <text class="caption" x="160" y="386">The cards remain in place behind the modal. Details no longer render below the grid.</text>

    <g transform="translate(160 430)">
      <rect class="surface shadow" width="350" height="384" rx="12"/>
      <rect x="14" y="14" width="322" height="196" rx="9" fill="#86b4a9"/>
      <path d="M14 170 C80 118, 120 210, 180 150 S270 130, 336 176 L336 210 L14 210 Z" fill="#649a8c" opacity="0.75"/>
      <rect x="248" y="168" width="68" height="28" rx="14" fill="#fff"/>
      <text x="266" y="187" font-size="13" font-weight="800" fill="#0f7b6c">7 days</text>
      <text class="h3" x="24" y="247">Classic Vietnam</text>
      <text class="body" x="24" y="278">Hanoi, Halong Bay, Hoi An</text>
      <rect x="24" y="307" width="126" height="46" rx="12" fill="#ffffff" stroke="#0f7b6c" stroke-width="2"/>
      <text class="button-text" x="59" y="336" fill="#0f7b6c">Details</text>
      <rect class="accent" x="166" y="307" width="160" height="46" rx="12"/>
      <text class="button-text white-text" x="198" y="336">Plan this trip</text>
    </g>

    <g transform="translate(545 430)">
      <rect class="surface shadow" width="350" height="384" rx="12"/>
      <rect x="14" y="14" width="322" height="196" rx="9" fill="#d2b178"/>
      <path d="M14 146 C70 114, 112 170, 162 140 S250 86, 336 130 L336 210 L14 210 Z" fill="#9f8058" opacity="0.72"/>
      <rect x="248" y="168" width="68" height="28" rx="14" fill="#fff"/>
      <text x="262" y="187" font-size="13" font-weight="800" fill="#0f7b6c">10 days</text>
      <text class="h3" x="24" y="247">Vietnam Highlights</text>
      <text class="body" x="24" y="278">North to South private route</text>
      <rect x="24" y="307" width="126" height="46" rx="12" fill="#e9f5f1" stroke="#0f7b6c" stroke-width="3"/>
      <text class="button-text" x="59" y="336" fill="#0f7b6c">Details</text>
      <rect class="accent" x="166" y="307" width="160" height="46" rx="12"/>
      <text class="button-text white-text" x="198" y="336">Plan this trip</text>
      <path d="M87 360 L87 405" stroke="#0f7b6c" stroke-width="3" stroke-dasharray="5 5"/>
      <text class="container-label" x="12" y="426">Details clicked</text>
    </g>

    <g transform="translate(930 430)">
      <rect class="surface shadow" width="350" height="384" rx="12"/>
      <rect x="14" y="14" width="322" height="196" rx="9" fill="#7f9fc4"/>
      <path d="M14 160 C80 114, 130 188, 198 138 S282 110, 336 146 L336 210 L14 210 Z" fill="#557a9f" opacity="0.76"/>
      <rect x="248" y="168" width="68" height="28" rx="14" fill="#fff"/>
      <text x="265" y="187" font-size="13" font-weight="800" fill="#0f7b6c">5 days</text>
      <text class="h3" x="24" y="247">Hoi An Escape</text>
      <text class="body" x="24" y="278">Food, culture and beaches</text>
      <rect x="24" y="307" width="126" height="46" rx="12" fill="#ffffff" stroke="#0f7b6c" stroke-width="2"/>
      <text class="button-text" x="59" y="336" fill="#0f7b6c">Details</text>
      <rect class="accent" x="166" y="307" width="160" height="46" rx="12"/>
      <text class="button-text white-text" x="198" y="336">Plan this trip</text>
    </g>
  </g>

  <rect class="overlay" width="1440" height="1040"/>

  <g id="modal" class="modal-shadow">
    <rect x="160" y="178" width="1120" height="744" rx="12" fill="#ffffff"/>
    <rect class="container-guide" x="160" y="178" width="1120" height="744" rx="12"/>
    <text class="container-label" x="865" y="158">Modal panel uses the same .container width</text>

    <line x1="198" y1="254" x2="1242" y2="254" class="soft-line"/>
    <text class="tiny" x="200" y="222">TOUR DETAILS</text>
    <text class="h1" x="200" y="247">Vietnam Highlights: Hanoi to Ho Chi Minh City</text>

    <button>
      <rect x="1222" y="202" width="38" height="38" rx="19" fill="#ffffff" stroke="#d7cfc2" stroke-width="1.5"/>
      <text x="1235" y="227" font-size="18" font-weight="800" fill="#203239">X</text>
    </button>

    <g transform="translate(200 281)">
      <rect x="0" y="0" width="144" height="36" rx="18" fill="#eef8f5"/>
      <text x="19" y="24" font-size="15" font-weight="800" fill="#0f7b6c">10 days</text>
      <rect x="158" y="0" width="186" height="36" rx="18" fill="#f5f1e9"/>
      <text x="179" y="24" font-size="15" font-weight="800" fill="#405156">Vietnam private tour</text>
      <rect x="358" y="0" width="166" height="36" rx="18" fill="#f5f1e9"/>
      <text x="379" y="24" font-size="15" font-weight="800" fill="#405156">From USD 1,280</text>
      <rect x="538" y="0" width="154" height="36" rx="18" fill="#f5f1e9"/>
      <text x="558" y="24" font-size="15" font-weight="800" fill="#405156">Customizable</text>
    </g>

    <g transform="translate(200 346)">
      <rect x="0" y="0" width="340" height="220" rx="10" fill="#9fcabf"/>
      <path d="M0 152 C68 112, 128 202, 194 144 S284 100, 340 138 L340 220 L0 220 Z" fill="#5f998a" opacity="0.7"/>
      <circle cx="62" cy="58" r="26" fill="#f8d27b" opacity="0.9"/>

      <text class="h3" x="0" y="265">Overview</text>
      <text class="body" x="0" y="296">A full-width popup keeps the user in the tours section while</text>
      <text class="body" x="0" y="320">giving the itinerary enough room for rich detail content.</text>
      <rect class="accent" x="0" y="358" width="178" height="48" rx="12"/>
      <text class="button-text white-text" x="31" y="388">Plan this trip</text>
      <rect x="194" y="358" width="146" height="48" rx="12" fill="#ffffff" stroke="#0f7b6c" stroke-width="2"/>
      <text class="button-text" x="231" y="388" fill="#0f7b6c">Customize</text>
    </g>

    <g transform="translate(585 346)">
      <text class="h2" x="0" y="0">Day-by-day itinerary</text>
      <text class="caption" x="0" y="32">The content scrolls inside the modal if it exceeds the viewport.</text>

      <g transform="translate(0 64)">
        <rect class="muted-surface" x="0" y="0" width="655" height="82" rx="10"/>
        <circle class="accent" cx="34" cy="41" r="18"/>
        <text class="white-text" x="28" y="47" font-size="16" font-weight="800">1</text>
        <text class="h3" x="70" y="34">Arrive in Hanoi</text>
        <text class="body" x="70" y="61">Private transfer, old quarter orientation and welcome dinner.</text>
      </g>

      <g transform="translate(0 162)">
        <rect class="muted-surface" x="0" y="0" width="655" height="82" rx="10"/>
        <circle class="accent" cx="34" cy="41" r="18"/>
        <text class="white-text" x="28" y="47" font-size="16" font-weight="800">2</text>
        <text class="h3" x="70" y="34">Halong Bay cruise</text>
        <text class="body" x="70" y="61">Board a premium overnight cruise with guided cave visits.</text>
      </g>

      <g transform="translate(0 260)">
        <rect class="muted-surface" x="0" y="0" width="655" height="82" rx="10"/>
        <circle class="accent" cx="34" cy="41" r="18"/>
        <text class="white-text" x="28" y="47" font-size="16" font-weight="800">3</text>
        <text class="h3" x="70" y="34">Hoi An food and culture</text>
        <text class="body" x="70" y="61">Market visit, cooking class and lantern-lit walking tour.</text>
      </g>

      <g transform="translate(0 382)">
        <text class="h3" x="0" y="0">Experience highlights</text>
        <rect x="0" y="24" width="150" height="98" rx="10" fill="#f5f1e9" stroke="#e0d7c8"/>
        <rect x="168" y="24" width="150" height="98" rx="10" fill="#f5f1e9" stroke="#e0d7c8"/>
        <rect x="336" y="24" width="150" height="98" rx="10" fill="#f5f1e9" stroke="#e0d7c8"/>
        <rect x="504" y="24" width="150" height="98" rx="10" fill="#f5f1e9" stroke="#e0d7c8"/>
        <text class="body" x="22" y="80">Culture</text>
        <text class="body" x="190" y="80">Cuisine</text>
        <text class="body" x="358" y="80">Cruise</text>
        <text class="body" x="526" y="80">Local guide</text>
      </g>
    </g>
  </g>

  <g id="notes">
    <rect x="160" y="950" width="1120" height="54" rx="10" fill="#203239"/>
    <text class="white-text" x="186" y="984" font-size="18" font-weight="700">Behavior: clicking Details opens this fixed modal. Close with X, Escape, or backdrop click. The inline details row is removed.</text>
  </g>

  <defs>
    <pattern id="heroPattern" width="180" height="120" patternUnits="userSpaceOnUse">
      <path d="M0 88 C48 58, 90 104, 140 70 S210 52, 260 82" fill="none" stroke="#ffffff" stroke-width="18" opacity="0.42"/>
      <path d="M-20 116 C35 82, 96 132, 158 92 S236 72, 290 108" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.28"/>
    </pattern>
  </defs>
</svg>
