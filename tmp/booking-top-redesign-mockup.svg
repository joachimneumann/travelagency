<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f4efe6"/>
      <stop offset="1" stop-color="#e8efe9"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="1100" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#173227" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 38px Georgia, serif; fill: #173227; }
      .subtle { font: 500 18px Arial, sans-serif; fill: #5a6a63; }
      .label { font: 700 15px Arial, sans-serif; fill: #3f4d47; }
      .value { font: 600 16px Arial, sans-serif; fill: #173227; }
      .btn { font: 700 16px Arial, sans-serif; fill: #173227; }
      .btnActive { font: 700 16px Arial, sans-serif; fill: #fffdf8; }
      .small { font: 600 13px Arial, sans-serif; fill: #6a766f; }
      .section { font: 700 20px Georgia, serif; fill: #173227; }
      .gate { font: 700 14px Arial, sans-serif; fill: #6c5230; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="1440" height="980" fill="url(#bg)"/>

  <rect x="84" y="72" width="1272" height="792" rx="28" fill="#fffdf8" filter="url(#shadow)"/>

  <text x="132" y="132" class="subtle">Back</text>
  <text x="132" y="188" class="title">Norway Family Adventure</text>
  <text x="132" y="224" class="subtle">ID: f2e667 • last updated 12 min ago</text>

  <rect x="1112" y="118" width="180" height="132" rx="22" fill="#dfe9df"/>
  <circle cx="1202" cy="170" r="34" fill="#6f8f7f"/>
  <text x="1181" y="179" class="btnActive">NF</text>
  <rect x="1138" y="214" width="128" height="18" rx="9" fill="#c5d4c8"/>

  <rect x="120" y="274" width="1200" height="2" fill="#ece5d8"/>

  <rect x="132" y="320" width="272" height="78" rx="16" fill="#f6f3ec" stroke="#e2dacb"/>
  <text x="152" y="348" class="label">ATP staff</text>
  <text x="152" y="376" class="value">Sang Nguyen</text>
  <text x="360" y="376" class="small">▼</text>

  <rect x="420" y="320" width="272" height="78" rx="16" fill="#f6f3ec" stroke="#e2dacb"/>
  <text x="440" y="348" class="label">Customer language</text>
  <text x="440" y="376" class="value">English</text>
  <text x="648" y="376" class="small">▼</text>

  <rect x="708" y="320" width="272" height="78" rx="16" fill="#eef4ef" stroke="#cfdccf"/>
  <text x="728" y="348" class="label">Source channel</text>
  <text x="728" y="376" class="value">WhatsApp</text>
  <text x="936" y="376" class="small">▼</text>

  <rect x="996" y="320" width="272" height="78" rx="16" fill="#eef4ef" stroke="#cfdccf"/>
  <text x="1016" y="348" class="label">Referred by</text>
  <text x="1016" y="376" class="value">B2B partner</text>
  <text x="1224" y="376" class="small">▼</text>

  <rect x="708" y="418" width="560" height="86" rx="18" fill="#f4f8f3" stroke="#d6e2d3"/>
  <text x="728" y="448" class="label">Partner name</text>
  <text x="728" y="480" class="value">Nordic Travel House</text>
  <text x="728" y="500" class="small">Shown only when the referral type needs extra detail</text>

  <rect x="120" y="536" width="1200" height="2" fill="#ece5d8"/>

  <text x="132" y="584" class="section">Booking status</text>
  <text x="1112" y="584" class="small">Last action: Offer sent on Mar 27, 2026</text>

  <rect x="132" y="614" width="1136" height="114" rx="24" fill="#faf5ee" stroke="#eadfce"/>
  <text x="156" y="646" class="gate">BEFORE DEPOSIT RECEIVED</text>
  <text x="156" y="670" class="small">These stages are available while the deposit has not been confirmed.</text>

  <rect x="156" y="688" width="180" height="52" rx="26" fill="#173227"/>
  <text x="190" y="720" class="btnActive">New booking</text>

  <rect x="352" y="688" width="208" height="52" rx="26" fill="#f6f3ec" stroke="#d9d1c2"/>
  <text x="385" y="720" class="btn">Travel plan sent</text>

  <rect x="576" y="688" width="152" height="52" rx="26" fill="#ead9c0"/>
  <text x="618" y="720" class="btn">Offer sent</text>

  <rect x="744" y="688" width="216" height="52" rx="26" fill="#f6f3ec" stroke="#d9d1c2"/>
  <text x="784" y="720" class="btn">Negotiation started</text>

  <rect x="976" y="688" width="244" height="52" rx="26" fill="#f6f3ec" stroke="#d9d1c2"/>
  <text x="1010" y="720" class="btn">Deposit request sent</text>

  <g transform="translate(636 760)">
    <line x1="0" y1="26" x2="164" y2="26" stroke="#b88f55" stroke-width="3" stroke-dasharray="8 8"/>
    <circle cx="82" cy="26" r="26" fill="#c98d3d"/>
    <text x="45" y="31" class="btnActive">Deposit</text>
  </g>

  <rect x="132" y="792" width="1136" height="114" rx="24" fill="#f3f8f2" stroke="#d6e2d3"/>
  <text x="156" y="824" class="gate">AFTER DEPOSIT RECEIVED</text>
  <text x="156" y="848" class="small">Once the deposit is confirmed, the workflow moves into delivery and completion.</text>

  <rect x="156" y="866" width="164" height="52" rx="26" fill="#f6f3ec" stroke="#d9d1c2"/>
  <text x="198" y="898" class="btn">In progress</text>

  <rect x="336" y="866" width="188" height="52" rx="26" fill="#f6f3ec" stroke="#d9d1c2"/>
  <text x="374" y="898" class="btn">Trip completed</text>

  <rect x="1088" y="866" width="180" height="52" rx="26" fill="#f3dfd8"/>
  <text x="1142" y="898" class="btn">Booking lost</text>
</svg>
