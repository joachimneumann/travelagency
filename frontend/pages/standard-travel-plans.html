<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n-id="backend.standard_travel_plans.heading">Standard travel plans</title>
    <meta name="description" content="AsiaTravelPlan standard travel plan templates" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <script>
      if (!window.ASIATRAVELPLAN_API_BASE && ["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        window.ASIATRAVELPLAN_API_BASE = window.location.origin;
      }
    </script>
    <script src="/frontend/scripts/shared/localhost_diagnostics.js"></script>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <style>
      .backend-table__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
    </style>
  </head>
  <body class="backend-list-page">
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="bookings.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="assets/img/logo-asiatravelplan.svg" alt="AsiaTravelPlan" width="320" height="76" />
        </a>

        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div id="backendError" class="backend-message" role="alert" aria-live="assertive"></div>

          <section class="backend-section" id="standardTravelPlansPanel">
            <div class="backend-controls">
              <div class="field">
                <label for="standardTravelPlansSearch" data-i18n-id="backend.standard_travel_plans.search_label">Search templates</label>
                <input id="standardTravelPlansSearch" type="text" data-i18n-placeholder-id="backend.standard_travel_plans.search_placeholder" placeholder="title" />
              </div>
              <div class="field">
                <label for="standardTravelPlansDestination" data-i18n-id="backend.standard_travel_plans.destination_label">Destination</label>
                <select id="standardTravelPlansDestination">
                  <option value="all" data-i18n-id="backend.standard_travel_plans.all_destinations">All destinations</option>
                </select>
              </div>
              <button class="btn btn-ghost" id="standardTravelPlansSearchBtn" type="button" data-i18n-id="common.search">Search</button>
              <button class="btn btn-ghost" id="standardTravelPlansClearFiltersBtn" type="button" data-i18n-id="backend.standard_travel_plans.clear_filters">Clear filters</button>
              <span id="standardTravelPlansCountInfo" class="micro"></span>
              <span id="standardTravelPlansActionStatus" class="micro" role="status" aria-live="polite"></span>
            </div>

            <div class="backend-table-wrap">
              <table class="backend-table" id="standardTravelPlansTable"></table>
            </div>
            <div class="backend-pagination" id="standardTravelPlansPagination" aria-label="Standard travel plan pagination"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="shared/generated/language_catalog.global.js"></script>
    <script src="frontend/scripts/shared/backend_i18n.js"></script>
    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/nav.js";
      await (window.__BACKEND_I18N_PROMISE || Promise.resolve());
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "standard-travel-plans" });
    </script>
    <script type="module" src="frontend/scripts/pages/standard_travel_plans.js"></script>
  </body>
</html>
