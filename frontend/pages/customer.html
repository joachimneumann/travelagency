<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AsiaTravelPlan Customer</title>
    <meta name="description" content="AsiaTravelPlan customer detail" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/styles.css?v=4" />
  </head>
  <body class="customer-page">
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="backend.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="assets/img/logo-asiatravelplan.svg" alt="AsiaTravelPlan" width="320" height="76" />
        </a>

        <nav class="nav backend-main-nav" aria-label="Backend navigation">
          <div class="backend-section-nav-wrap">
            <div class="backend-section-nav" role="tablist" aria-label="Backend sections">
              <button type="button" class="backend-section-nav__item" data-backend-section="dashboard" title="Dashboard" aria-label="Dashboard">
                <span class="backend-section-nav__icon" aria-hidden="true">🏠</span>
              </button>
              <button type="button" class="backend-section-nav__item" data-backend-section="customers" title="Customers" aria-label="Customers">
                <span class="backend-section-nav__icon" aria-hidden="true">👤</span>
              </button>
              <button type="button" class="backend-section-nav__item" data-backend-section="travelGroups" title="Travel Groups" aria-label="Travel Groups">
                <span class="backend-section-nav__icon" aria-hidden="true">👤👤👤</span>
              </button>
              <button type="button" class="backend-section-nav__item" data-backend-section="bookings" title="Bookings" aria-label="Bookings">
                <span class="backend-section-nav__icon" aria-hidden="true">📋</span>
              </button>
              <button type="button" class="backend-section-nav__item" data-backend-section="tours" title="Tours" aria-label="Tours">
                <span class="backend-section-nav__icon" aria-hidden="true">🗺️</span>
              </button>
              <button type="button" class="backend-section-nav__item" data-backend-section="settings" title="Reports and Settings" aria-label="Reports and Settings">
                <span class="backend-section-nav__icon" aria-hidden="true">📊</span>
              </button>
            </div>
          </div>

          <div class="backend-nav__meta">
            <ul class="nav-list">
              <li><a id="backToBackend" href="backend.html">Backend</a></li>
              <li class="backend-nav__website"><a href="index.html">Website</a></li>
              <li class="backend-nav__logout">
                <a class="backend-nav__logout-link" id="backendLogoutLink" href="#">
                  <span class="backend-nav__logout-title">Logout</span>
                  <span class="backend-nav__user" id="backendUserLabel"></span>
                </a>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div class="customer-hero">
            <div class="customer-hero__photo">
              <img class="customer-hero__photo-image" id="customerHeroPhoto" alt="Customer photo" hidden />
              <div class="customer-hero__photo-placeholder" id="customerHeroPhotoPlaceholder">Photo</div>
            </div>
            <div class="customer-hero__copy">
              <h1 class="customer-hero__name" id="customerHeroName">Customer</h1>
              <span class="customer-hero__id" id="customerHeroId">ID: -</span>
            </div>
          </div>

          <div id="detailError" class="backend-message" role="alert" aria-live="assertive"></div>

          <section class="u-stack-md">
            <div class="customer-primary-group">
              <div class="customer-primary-group__header">
                <button id="customerSaveBtn" class="btn btn-primary" type="button" disabled>Update</button>
              </div>
              <div class="customer-photo-panel">
                <div class="field full">
                  <label for="customerPhotoInput">Customer Photo</label>
                  <input id="customerPhotoInput" type="file" accept="image/*" />
                </div>
                <div class="customer-photo-panel__actions">
                  <button id="customerPhotoUploadBtn" class="btn btn-ghost" type="button">Upload photo</button>
                  <span id="customerPhotoStatus" class="micro"></span>
                </div>
              </div>
              <div id="customerPrimaryGroup"></div>
              <div class="customer-organization-group" id="customerOrganizationGroup"></div>
              <h2 class="section-title u-title-compact">Address</h2>
              <div class="customer-address-group" id="customerAddressGroup"></div>
              <h2 class="section-title u-title-compact">Notes</h2>
              <div id="customerNotesGroup"></div>
            </div>
            <p id="customerSaveStatus" class="section-booking" hidden></p>
          </section>

          <section class="u-stack-md">
            <div class="customer-consent-header">
              <h2 class="section-title u-title-compact">Customer consents</h2>
              <button id="customerAddConsentBtn" class="customer-add-consent-btn" type="button" aria-label="Add consent">+</button>
            </div>
            <div class="customer-consent-form" id="customerConsentForm" hidden>
              <div class="field-grid">
                <div class="field">
                  <label for="customerConsentType">Consent Type</label>
                  <select id="customerConsentType">
                    <option value="privacy_policy">privacy_policy</option>
                    <option value="marketing_email">marketing_email</option>
                    <option value="marketing_whatsapp">marketing_whatsapp</option>
                    <option value="profiling">profiling</option>
                  </select>
                </div>
                <div class="field">
                  <label for="customerConsentStatus">Status</label>
                  <select id="customerConsentStatus">
                    <option value="granted">granted</option>
                    <option value="withdrawn">withdrawn</option>
                    <option value="unknown">unknown</option>
                  </select>
                </div>
                <div class="field">
                  <label for="customerConsentCapturedVia">Captured Via</label>
                  <input id="customerConsentCapturedVia" type="text" />
                </div>
                <div class="field">
                  <label for="customerConsentCapturedAt">Captured At</label>
                  <input id="customerConsentCapturedAt" type="datetime-local" />
                </div>
                <div class="field full">
                  <label for="customerConsentEvidenceRef">Evidence Ref</label>
                  <input id="customerConsentEvidenceRef" type="text" />
                </div>
                <div class="field full">
                  <label for="customerConsentEvidenceFile">Evidence File</label>
                  <input id="customerConsentEvidenceFile" type="file" accept=".pdf,image/*" />
                </div>
              </div>
              <div class="customer-consent-form__actions">
                <button id="customerConsentSaveBtn" class="btn btn-primary" type="button">Save consent</button>
                <button id="customerConsentCancelBtn" class="btn btn-ghost" type="button">Cancel</button>
                <span id="customerConsentFormStatus" class="micro"></span>
              </div>
            </div>
            <div class="backend-table-wrap">
              <table class="backend-table" id="customerConsentsTable"></table>
            </div>
          </section>

          <section class="u-stack-md">
            <h2 class="section-title u-title-compact">Customer documents</h2>
            <div class="backend-table-wrap">
              <table class="backend-table" id="customerDocumentsTable"></table>
            </div>
          </section>

          <section class="u-stack-md">
            <h2 class="section-title u-title-compact">Travel group members</h2>
            <div class="backend-table-wrap">
              <table class="backend-table" id="customerTravelGroupMembersTable"></table>
            </div>
          </section>

          <section class="u-stack-md">
            <h2 class="section-title u-title-compact">Travel groups</h2>
            <div class="backend-table-wrap">
              <table class="backend-table" id="customerTravelGroupsTable"></table>
            </div>
          </section>

          <section>
            <h2 class="section-title u-title-compact">Related bookings</h2>
            <div class="backend-table-wrap">
              <table class="backend-table" id="customerBookingsTable"></table>
            </div>
          </section>

          <section>
            <p class="customer-system-meta" id="customerSystemMeta"></p>
          </section>

          <section>
            <div class="customer-bottom-actions">
              <button id="customerSaveBtnBottom" class="btn btn-primary" type="button" disabled>Update</button>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="assets/js/backend-customer.js?v=20260306b"></script>
  </body>
</html>
