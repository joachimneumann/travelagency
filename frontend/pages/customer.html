<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AsiaTravelPlan Customer</title>
    <meta name="description" content="AsiaTravelPlan customer detail" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/styles.css?v=3" />
    <style>
      .customer-hero {
        margin-bottom: 1.4rem;
        padding: 1.3rem 1.4rem;
        border: 1px solid rgba(22, 49, 61, 0.12);
        border-radius: 24px;
        background:
          radial-gradient(circle at top right, rgba(166, 208, 198, 0.28), transparent 42%),
          linear-gradient(145deg, rgba(248, 251, 250, 0.96), rgba(255, 255, 255, 0.98));
        box-shadow: 0 18px 40px rgba(16, 36, 46, 0.08);
      }

      .customer-hero__top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.7rem;
        margin-bottom: 0.9rem;
      }

      .customer-hero__title {
        display: inline-flex;
        align-items: center;
        min-height: 2rem;
        padding: 0.35rem 0.85rem;
        border-radius: 999px;
        background: rgba(16, 102, 88, 0.1);
        color: #0d5d51;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .customer-hero__id {
        color: rgba(22, 49, 61, 0.68);
        font-size: 0.94rem;
      }

      .customer-hero__name {
        margin: 0;
        color: #16313d;
        font-size: clamp(2rem, 4vw, 3.15rem);
        line-height: 1.04;
      }

      .customer-primary-group {
        margin-bottom: 1rem;
      }

      .customer-primary-group .field label {
        color: rgba(22, 49, 61, 0.72);
        letter-spacing: 0.02em;
      }

      .customer-primary-group .field input,
      .customer-primary-group .field select,
      .customer-primary-group .field textarea {
        background: rgba(255, 255, 255, 0.96);
      }

      .customer-primary-group .field-grid {
        margin: 0;
        grid-template-columns: 8rem minmax(0, 1.6fr) repeat(2, minmax(0, 1fr));
      }

      .customer-primary-group .field--title {
        grid-column: span 1;
      }

      .customer-primary-group .field--name {
        grid-column: span 1;
      }
    </style>
  </head>
  <body>
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="backend.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="assets/img/logo-asiatravelplan.svg" alt="AsiaTravelPlan" width="320" height="76" />
        </a>

        <nav class="nav backend-main-nav" aria-label="Backend navigation">
          <div class="backend-section-nav-wrap">
            <div class="backend-section-nav" role="tablist" aria-label="Backend sections">
              <button type="button" class="backend-section-nav__item" data-backend-section="dashboard" title="Dashboard" aria-label="Dashboard">
                <span class="backend-section-nav__icon" aria-hidden="true">🏠</span>
              </button>
              <button type="button" class="backend-section-nav__item" data-backend-section="customers" title="Customers" aria-label="Customers">
                <span class="backend-section-nav__icon" aria-hidden="true">👤</span>
              </button>
              <button type="button" class="backend-section-nav__item" data-backend-section="travelGroups" title="Travel Groups" aria-label="Travel Groups">
                <span class="backend-section-nav__icon" aria-hidden="true">👤👤👤</span>
              </button>
              <button type="button" class="backend-section-nav__item" data-backend-section="bookings" title="Bookings" aria-label="Bookings">
                <span class="backend-section-nav__icon" aria-hidden="true">📋</span>
              </button>
              <button type="button" class="backend-section-nav__item" data-backend-section="tours" title="Tours" aria-label="Tours">
                <span class="backend-section-nav__icon" aria-hidden="true">🗺️</span>
              </button>
              <button type="button" class="backend-section-nav__item" data-backend-section="settings" title="Reports and Settings" aria-label="Reports and Settings">
                <span class="backend-section-nav__icon" aria-hidden="true">📊</span>
              </button>
            </div>
          </div>

          <div class="backend-nav__meta">
            <ul class="nav-list">
              <li><a id="backToBackend" href="backend.html">Backend</a></li>
              <li class="backend-nav__website"><a href="index.html">Website</a></li>
              <li class="backend-nav__logout">
                <a class="backend-nav__logout-link" id="backendLogoutLink" href="#">
                  <span class="backend-nav__logout-title">Logout</span>
                  <span class="backend-nav__user" id="backendUserLabel"></span>
                </a>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <section class="customer-hero" aria-labelledby="customerHeroName">
            <div class="customer-hero__top">
              <span class="customer-hero__title" id="customerHeroTitle" hidden></span>
              <span class="customer-hero__id" id="customerHeroId">ID: -</span>
            </div>
            <h1 class="customer-hero__name" id="customerHeroName">Customer</h1>
          </section>

          <div id="detailError" class="backend-message" role="alert" aria-live="assertive"></div>

          <section style="margin-bottom: 1rem;">
            <div class="backend-controls">
              <label class="field">
                <span>Organization</span>
                <input id="customerIsOrganization" type="checkbox" />
              </label>
              <button id="customerSaveBtn" class="btn btn-primary" type="button" disabled>Update</button>
            </div>
            <p id="customerSaveStatus" class="section-booking" hidden></p>
            <div class="customer-primary-group" id="customerPrimaryGroup"></div>
            <div class="backend-table-wrap">
              <table class="backend-table" id="customerDataTable"></table>
            </div>
          </section>

          <section style="margin-bottom: 1rem;">
            <h2 class="section-title" style="font-size: 1.05rem;">Customer consents</h2>
            <div class="backend-table-wrap">
              <table class="backend-table" id="customerConsentsTable"></table>
            </div>
          </section>

          <section style="margin-bottom: 1rem;">
            <h2 class="section-title" style="font-size: 1.05rem;">Customer documents</h2>
            <div class="backend-table-wrap">
              <table class="backend-table" id="customerDocumentsTable"></table>
            </div>
          </section>

          <section style="margin-bottom: 1rem;">
            <h2 class="section-title" style="font-size: 1.05rem;">Travel group members</h2>
            <div class="backend-table-wrap">
              <table class="backend-table" id="customerTravelGroupMembersTable"></table>
            </div>
          </section>

          <section style="margin-bottom: 1rem;">
            <h2 class="section-title" style="font-size: 1.05rem;">Travel groups</h2>
            <div class="backend-table-wrap">
              <table class="backend-table" id="customerTravelGroupsTable"></table>
            </div>
          </section>

          <section>
            <h2 class="section-title" style="font-size: 1.05rem;">Related bookings</h2>
            <div class="backend-table-wrap">
              <table class="backend-table" id="customerBookingsTable"></table>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="assets/js/backend-customer.js?v=20260305a"></script>
  </body>
</html>
