<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AsiaTravelPlan Customer</title>
    <meta name="description" content="AsiaTravelPlan customer detail" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/styles.css?v=4" />
  </head>
  <body class="customer-page">
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="backend.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="assets/img/logo-asiatravelplan.svg" alt="AsiaTravelPlan" width="320" height="76" />
        </a>

        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div class="customer-hero">
            <button class="customer-hero__photo customer-hero__photo-button" id="customerPhotoPicker" type="button" aria-label="Choose customer photo">
              <img class="customer-hero__photo-image" id="customerHeroPhoto" alt="Customer photo" hidden />
              <div class="customer-hero__photo-placeholder" id="customerHeroPhotoPlaceholder" aria-hidden="true">
                <img class="customer-hero__photo-placeholder-image" src="assets/img/profile_person.png" alt="" />
              </div>
            </button>
            <div class="customer-hero__copy">
              <h1 class="customer-hero__name" id="customerHeroName">Customer</h1>
              <div class="customer-hero__id-block">
                <div class="customer-hero__id-row">
                  <span class="customer-hero__id" id="customerHeroId">ID: -</span>
                  <button class="customer-hero__id-copy" id="customerHeroCopyBtn" type="button">copy</button>
                  <div class="customer-hero__id-copy-status" id="customerHeroCopyStatus" hidden></div>
                </div>
              </div>
            </div>
          </div>
          <input id="customerPhotoInput" class="customer-photo-input" type="file" accept="image/*" />

          <div id="detailError" class="backend-message" role="alert" aria-live="assertive"></div>

          <section class="u-stack-md">
            <div class="customer-primary-group">
              <div class="customer-primary-group__header">
                <button id="customerSaveBtn" class="btn btn-primary" type="button" disabled>Update</button>
              </div>
              <div id="customerPrimaryGroup"></div>
              <div class="customer-organization-group" id="customerOrganizationGroup"></div>
              <h2 class="section-title u-title-compact">Address</h2>
              <div class="customer-address-group" id="customerAddressGroup"></div>
              <div id="customerNotesGroup"></div>
            </div>
            <p id="customerSaveStatus" class="section-booking" hidden></p>
          </section>

          <section class="u-stack-md">
            <div class="customer-consent-header">
              <h2 class="section-title u-title-compact">Customer consents</h2>
              <button id="customerAddConsentBtn" class="customer-add-consent-btn" type="button" aria-label="Add consent">+</button>
            </div>
            <div class="customer-consent-form" id="customerConsentForm" hidden>
              <div class="field-grid">
                <div class="field">
                  <label for="customerConsentType">Consent Type</label>
                  <select id="customerConsentType"></select>
                </div>
                <div class="field">
                  <label for="customerConsentStatus">Status</label>
                  <select id="customerConsentStatus"></select>
                </div>
                <div class="field">
                  <label for="customerConsentCapturedVia">Captured Via</label>
                  <input id="customerConsentCapturedVia" type="text" />
                </div>
                <div class="field">
                  <label for="customerConsentCapturedAt">Captured At</label>
                  <input id="customerConsentCapturedAt" type="datetime-local" />
                </div>
                <div class="field full">
                  <label for="customerConsentEvidenceRef">Evidence Ref</label>
                  <input id="customerConsentEvidenceRef" type="text" />
                </div>
                <div class="field full">
                  <label for="customerConsentEvidenceFile">Evidence File</label>
                  <input id="customerConsentEvidenceFile" type="file" accept=".pdf,image/*" />
                </div>
              </div>
              <div class="customer-consent-form__actions">
                <button id="customerConsentSaveBtn" class="btn btn-primary" type="button">Save consent</button>
                <button id="customerConsentCancelBtn" class="btn btn-ghost" type="button">Cancel</button>
                <span id="customerConsentFormStatus" class="micro"></span>
              </div>
            </div>
            <div class="backend-table-wrap">
              <table class="backend-table" id="customerConsentsTable"></table>
            </div>
          </section>

          <section class="u-stack-md">
            <h2 class="section-title u-title-compact">Customer documents</h2>
            <div class="backend-table-wrap">
              <table class="backend-table" id="customerDocumentsTable"></table>
            </div>
          </section>

          <section class="u-stack-md">
            <h2 class="section-title u-title-compact">Travel group members</h2>
            <div class="backend-table-wrap">
              <table class="backend-table" id="customerTravelGroupMembersTable"></table>
            </div>
          </section>

          <section class="u-stack-md">
            <h2 class="section-title u-title-compact">Travel groups</h2>
            <div class="backend-table-wrap">
              <table class="backend-table" id="customerTravelGroupsTable"></table>
            </div>
          </section>

          <section>
            <h2 class="section-title u-title-compact">Related bookings</h2>
            <div class="backend-table-wrap">
              <table class="backend-table" id="customerBookingsTable"></table>
            </div>
          </section>

          <section>
            <p class="customer-system-meta" id="customerSystemMeta"></p>
          </section>

          <section class="customer-danger-zone">
            <h2 class="section-title u-title-compact">DANGER ZONE</h2>
            <button id="customerDeleteBtn" class="btn customer-danger-zone__delete" type="button">Delete customer</button>
            <p class="customer-danger-zone__reason" id="customerDeleteReason" hidden></p>
          </section>

        </div>
      </section>
    </main>

    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/backend-nav.js";
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "customers" });
    </script>
    <script type="module" src="frontend/scripts/backend-customer.js?v=20260307a"></script>
  </body>
</html>
