<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n-id="backend.tour_variant.heading">Tour Variant</title>
    <meta name="description" content="AsiaTravelPlan backend Tour Variant editor" />
    <link rel="icon" href="/assets/img/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/assets/img/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" sizes="180x180" />
    <script>
      {
        const hostname = window.location.hostname;
        const isPrivateNetworkHost = /^(10\.|192\.168\.|172\.(1[6-9]|2\d|3[0-1])\.)/.test(hostname);
        const isLocalEnvironment = ["localhost", "127.0.0.1", "::1", "[::1]"].includes(hostname) || isPrivateNetworkHost;
        const isStagingEnvironment = hostname === "staging.asiatravelplan.com";
        const environmentIcon = isLocalEnvironment
          ? { href: "/assets/img/local.small.png", sizes: "200x200" }
          : isStagingEnvironment
            ? { href: "/assets/img/staging.small.png", sizes: "150x150" }
            : null;
        const environmentAppleTouchIcon = isLocalEnvironment
          ? { href: "/assets/img/local-home-screen-icon.png", sizes: "180x180" }
          : isStagingEnvironment
            ? { href: "/assets/img/staging-home-screen-icon.png", sizes: "180x180" }
            : null;
        if (environmentIcon) {
          document.querySelector('link[rel="icon"][sizes="32x32"]')?.setAttribute("href", environmentIcon.href);
          document.querySelector('link[rel="icon"][sizes="16x16"]')?.setAttribute("href", environmentIcon.href);
        }
        if (environmentAppleTouchIcon) {
          const appleTouchIcon = document.querySelector('link[rel="apple-touch-icon"]');
          appleTouchIcon?.setAttribute("href", environmentAppleTouchIcon.href);
          appleTouchIcon?.setAttribute("sizes", environmentAppleTouchIcon.sizes);
        }
      }
    </script>
    <script>
      if (!window.ASIATRAVELPLAN_API_BASE && ["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        window.ASIATRAVELPLAN_API_BASE = window.location.origin;
      }
    </script>
    <script>
      if (["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        const diagnosticsScript = document.createElement("script");
        diagnosticsScript.src = "/frontend/scripts/shared/localhost_diagnostics.js";
        document.head.append(diagnosticsScript);
      }
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <style>
      :root {
        --tour-variant-backend-menu-height: var(--backend-menu-height, 74px);
        --tour-variant-customizer-height: var(
          --backend-available-height,
          calc(100vh - var(--tour-variant-backend-menu-height))
        );
        --tour-variant-container-padding: 15px;
      }

      @supports (height: 100dvh) {
        :root {
          --tour-variant-customizer-height: var(
            --backend-available-height,
            calc(100dvh - var(--tour-variant-backend-menu-height))
          );
        }
      }

      .tour-variant-editor {
        display: grid;
        gap: 0.75rem;
        overflow: visible;
      }

      .tour-variant-page-container {
        padding: var(--tour-variant-container-padding);
      }

      .tour-variant-toolbar {
        position: sticky;
        top: var(--tour-variant-backend-menu-height);
        z-index: 40;
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.65rem 0.75rem;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }

      .tour-variant-toolbar__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-self: flex-start;
      }

      .tour-variant-toolbar__actions .btn {
        min-height: 2.45rem;
        padding: 0.6rem 1.15rem;
      }

      .tour-variant-title {
        flex: 1 1 24rem;
        display: grid;
        gap: 0.2rem;
        min-width: min(28rem, 100%);
      }

      .tour-variant-title-input {
        width: 100%;
        border: 0;
        border-bottom: 2px solid transparent;
        border-radius: 0;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: var(--font-size-heading);
        font-weight: 800;
        line-height: 1.1;
        padding: 0;
      }

      .tour-variant-title-input:focus-visible {
        outline: 2px solid var(--secondary);
        outline-offset: 2px;
        border-bottom-color: var(--accent);
      }

      .tour-variant-published-toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        justify-self: start;
        margin-top: 0;
        font-weight: 600;
        white-space: nowrap;
      }

      .tour-card-image-selector {
        padding: 1rem;
        border: 1px solid var(--line);
        border-radius: 1rem;
        background: var(--surface);
      }

      .tour-card-image-selector__layout {
        display: grid;
        grid-template-columns: calc(104px + 0.85rem) minmax(0, 1fr);
        gap: 1rem;
        align-items: start;
      }

      .tour-card-image-selector__preview {
        align-self: center;
        width: 104px;
        border-radius: 0.8rem;
        border: 1px solid var(--line);
        background: var(--surface-muted);
        object-fit: cover;
      }

      .tour-card-image-selector__content {
        display: grid;
        gap: 0.85rem;
        min-width: 0;
        position: relative;
      }

      .tour-card-image-selector__clear {
        position: absolute;
        inset: 0 0 auto auto;
        z-index: 2;
      }

      .tour-card-image-selector__thumbs {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        padding-inline-end: 7.5rem;
      }

      .tour-card-image-selector__thumb {
        position: relative;
        display: block;
        width: 60px;
        height: 60px;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 0.55rem;
        background: var(--surface-muted);
        overflow: hidden;
      }

      button.tour-card-image-selector__thumb:not(:disabled) {
        cursor: pointer;
      }

      .tour-card-image-selector__thumb img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .tour-card-image-selector__thumb.is-selected {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-tint);
      }

      .tour-card-image-selector__order {
        position: absolute;
        inset: 4px auto auto 4px;
        display: grid;
        place-items: center;
        width: 20px;
        height: 20px;
        border-radius: 999px;
        background: var(--accent);
        color: var(--surface);
        font-size: 0.76rem;
        font-weight: var(--font-weight-bold);
        line-height: 1;
        box-shadow: 0 0 0 2px var(--surface);
      }

      .tour-card-image-selector__order[hidden] {
        display: none;
      }

      .tour-card-image-selector__thumb:disabled,
      .tour-card-image-selector__thumb[aria-disabled="true"] {
        opacity: 0.58;
      }

      .tour-variant-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 0.75rem;
        align-items: start;
      }

      .tour-variant-panel {
        display: grid;
        gap: 0.65rem;
        padding: 0.65rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
      }

      .tour-variant-panel h2 {
        margin: 0;
        font-size: var(--font-size-h3);
      }

      .tour-variant-panel__body {
        display: grid;
        gap: 0.65rem;
      }

      .tour-variant-collapsible {
        padding: 0;
        overflow: hidden;
      }

      .tour-variant-collapsible > summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.72rem 0.85rem;
        cursor: pointer;
        list-style: none;
        font-size: var(--font-size-h3);
        font-weight: 700;
      }

      .tour-variant-collapsible > summary::-webkit-details-marker {
        display: none;
      }

      .tour-variant-collapsible > summary::after {
        content: "";
        width: 0.55rem;
        height: 0.55rem;
        border-right: 2px solid currentColor;
        border-bottom: 2px solid currentColor;
        transform: rotate(45deg);
        transition: transform 0.16s ease;
      }

      .tour-variant-collapsible[open] > summary::after {
        transform: rotate(225deg);
      }

      .tour-variant-collapsible__body {
        display: grid;
        gap: 0.65rem;
        padding: 0 0.85rem 0.85rem;
      }

      .tour-variant-customizer-heading {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        justify-content: space-between;
        gap: 0.85rem;
      }

      .tour-variant-fields {
        display: grid;
        gap: 0.65rem 0.8rem;
        grid-template-columns: minmax(7rem, 0.7fr) repeat(2, minmax(0, 1fr));
      }

      .tour-variant-fields .field--wide {
        grid-column: 1 / -1;
      }

      .tour-variant-style-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }

      .tour-variant-style-grid label {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.5rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-muted);
        font-weight: 600;
      }

      .tour-variant-boundary-heading {
        margin: 0 0 0.1rem;
        font-size: var(--font-size-ui-md);
      }

      .tour-variant-boundary-fields {
        grid-template-columns:
          minmax(0, 1.45fr) minmax(7rem, 0.7fr)
          1.5rem
          minmax(0, 1.45fr) minmax(7rem, 0.7fr);
        gap: 0.65rem 1rem;
        align-items: start;
      }

      .tour-variant-boundary-heading--arrival {
        grid-column: 1 / 3;
        grid-row: 1;
      }

      .tour-variant-boundary-heading--departure {
        grid-column: 4 / 6;
        grid-row: 1;
      }

      .tour-variant-boundary-field--arrival.tour-variant-boundary-field--mode {
        grid-column: 1;
        grid-row: 2;
      }

      .tour-variant-boundary-field--arrival.tour-variant-boundary-field--airport-code {
        grid-column: 2;
        grid-row: 2;
      }

      .tour-variant-boundary-field--arrival.tour-variant-boundary-field--title {
        grid-column: 1 / 3;
        grid-row: 3;
      }

      .tour-variant-boundary-field--arrival.tour-variant-boundary-field--details {
        grid-column: 1 / 3;
        grid-row: 4;
      }

      .tour-variant-boundary-field--departure.tour-variant-boundary-field--mode {
        grid-column: 4;
        grid-row: 2;
      }

      .tour-variant-boundary-field--departure.tour-variant-boundary-field--airport-code {
        grid-column: 5;
        grid-row: 2;
      }

      .tour-variant-boundary-field--departure.tour-variant-boundary-field--title {
        grid-column: 4 / 6;
        grid-row: 3;
      }

      .tour-variant-boundary-field--departure.tour-variant-boundary-field--details {
        grid-column: 4 / 6;
        grid-row: 4;
      }

      .tour-variant-editor .field {
        gap: 0.22rem;
      }

      .tour-variant-editor .field label,
      .tour-variant-editor .field .field-label {
        padding-left: 0;
      }

      .tour-variant-editor .field input,
      .tour-variant-editor .field select,
      .tour-variant-editor .field textarea {
        padding: 0.5rem 0.62rem;
      }

      .tour-variant-editor .field textarea {
        min-height: 4.6rem;
      }

      .tour-variant-editor__feedback {
        display: grid;
        gap: 0.3rem;
        margin: 0 0 0.8rem;
        min-height: 1.5rem;
      }

      .tour-variant-status {
        color: var(--muted);
        font-size: 0.86rem;
      }

      .tour-variant-map-row {
        display: grid;
        grid-template-columns: max-content minmax(16rem, 34rem);
        align-items: center;
        justify-content: center;
        gap: 0.85rem;
      }

      .tour-variant-map-preview-mount {
        display: block;
        width: 100px;
        height: 200px;
        min-height: 0;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #f7f9f7;
        box-shadow: 0 8px 18px var(--shadow-card-04);
        cursor: pointer;
      }

      .tour-variant-map-preview-mount:hover,
      .tour-variant-map-preview-mount:focus-within {
        border-color: var(--accent);
        outline: 2px solid color-mix(in srgb, var(--accent) 40%, transparent);
        outline-offset: 2px;
      }

      .tour-variant-day-summary {
        width: min(34rem, 46vw);
        max-height: 200px;
        overflow: auto;
        padding: 0.2rem 0.15rem;
      }

      .tour-variant-day-summary__list {
        display: grid;
        gap: 0.45rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .tour-variant-day-summary__item {
        display: grid;
        grid-template-columns: max-content minmax(0, 1fr);
        gap: 0.2rem 0.55rem;
        align-items: start;
        padding: 0.42rem 0.55rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
      }

      .tour-variant-day-summary__number {
        grid-row: 1 / 3;
        color: var(--accent);
        font-weight: 800;
        white-space: nowrap;
      }

      .tour-variant-day-summary__title {
        min-width: 0;
        color: var(--text);
        font-weight: 700;
        line-height: 1.2;
      }

      .tour-variant-day-summary__source {
        min-width: 0;
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.25;
      }

      .tour-variant-day-summary__source a {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      .tour-variant-day-summary__source a:hover,
      .tour-variant-day-summary__source a:focus-visible {
        text-decoration: underline;
      }

      .tour-variant-customizer-overlay[hidden] {
        display: none !important;
      }

      .tour-variant-customizer-overlay {
        position: fixed;
        top: var(--tour-variant-backend-menu-height);
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 45;
        background: #f7f9f7;
      }

      .tour-variant-customizer-close {
        position: absolute;
        top: 0.75rem;
        right: 0.75rem;
        z-index: 70;
        box-shadow: 0 8px 18px var(--shadow-card-08);
      }

      .tour-variant-customizer-mount {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 0;
        margin: 0;
        overflow: hidden;
        background: #f7f9f7;
      }

      .tour-variant-issues {
        color: var(--danger-text);
      }

      @media (max-width: 980px) {
        .tour-variant-grid,
        .tour-variant-fields {
          grid-template-columns: 1fr;
        }

        .tour-variant-boundary-fields {
          grid-template-columns: minmax(0, 1.45fr) minmax(7rem, 0.7fr);
        }

        .tour-variant-boundary-heading--arrival {
          grid-column: 1 / 3;
          grid-row: 1;
        }

        .tour-variant-boundary-field--arrival.tour-variant-boundary-field--mode {
          grid-column: 1;
          grid-row: 2;
        }

        .tour-variant-boundary-field--arrival.tour-variant-boundary-field--airport-code {
          grid-column: 2;
          grid-row: 2;
        }

        .tour-variant-boundary-field--arrival.tour-variant-boundary-field--title {
          grid-column: 1 / 3;
          grid-row: 3;
        }

        .tour-variant-boundary-field--arrival.tour-variant-boundary-field--details {
          grid-column: 1 / 3;
          grid-row: 4;
        }

        .tour-variant-boundary-heading--departure {
          grid-column: 1 / 3;
          grid-row: 5;
        }

        .tour-variant-boundary-field--departure.tour-variant-boundary-field--mode {
          grid-column: 1;
          grid-row: 6;
        }

        .tour-variant-boundary-field--departure.tour-variant-boundary-field--airport-code {
          grid-column: 2;
          grid-row: 6;
        }

        .tour-variant-boundary-field--departure.tour-variant-boundary-field--title {
          grid-column: 1 / 3;
          grid-row: 7;
        }

        .tour-variant-boundary-field--departure.tour-variant-boundary-field--details {
          grid-column: 1 / 3;
          grid-row: 8;
        }
      }

      @media (max-width: 760px) {
        .tour-variant-map-row {
          grid-template-columns: max-content;
        }

        .tour-variant-published-toggle {
          justify-self: start;
          white-space: normal;
        }

        .tour-card-image-selector__layout {
          grid-template-columns: 1fr;
        }

        .tour-card-image-selector__preview {
          display: none;
        }

        .tour-variant-day-summary {
          width: min(100%, 22rem);
        }

      }

      @media (max-width: 620px) {
        :root {
          --tour-variant-backend-menu-height: var(--backend-menu-height, 68px);
        }

        .tour-variant-toolbar {
          top: var(--tour-variant-backend-menu-height);
        }
      }
    </style>
  </head>
  <body class="backend-page-loading--busy">
    <div class="booking-page-overlay backend-page-loading-overlay" id="backendPageLoadingOverlay" aria-hidden="false">
      <div class="booking-page-overlay__panel" role="status" aria-live="assertive">
        <span class="booking-page-overlay__spinner" aria-hidden="true"></span>
        <span class="booking-page-overlay__text" id="backendPageLoadingOverlayText" data-i18n-id="backend.page_loading_overlay">Loading page content. Please wait.</span>
      </div>
    </div>

    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="bookings.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="/assets/generated/runtime/brand-logo-backoffice.png" alt="AsiaTravelPlan" width="165" height="68" />
        </a>
        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <div class="container tour-variant-page-container">
          <div id="backendError" class="backend-message" role="alert" aria-live="assertive"></div>

          <section class="backend-section tour-variant-editor">
            <div class="tour-variant-toolbar">
              <div class="tour-variant-title">
                <h1 class="visually-hidden" id="tourVariantHeading" data-i18n-id="backend.tour_variant.heading">Tour Variant</h1>
                <label class="visually-hidden" for="tourVariantTitle" data-i18n-id="backend.tour_variant.title_label">Tour Variant title</label>
                <input class="tour-variant-title-input" id="tourVariantTitle" type="text" placeholder="Tour Variant" data-i18n-placeholder-id="backend.tour_variant.heading" />
              </div>
              <div class="tour-variant-toolbar__actions">
                <button class="btn btn-ghost" id="tourVariantReloadBtn" type="button" data-i18n-id="backend.tour_variant.reload">Reload</button>
                <button class="btn btn-primary" id="tourVariantSaveBtn" type="button" data-i18n-id="backend.tour_variant.save">Save</button>
              </div>
            </div>

            <div class="tour-variant-editor__feedback">
              <div id="tourVariantStatus" class="tour-variant-status" role="status" aria-live="polite"></div>
              <div id="tourVariantIssues" class="tour-variant-issues" role="status" aria-live="polite"></div>
            </div>

            <div id="tourVariantCardImageSelector" class="tour-card-image-selector">
              <div class="tour-card-image-selector__layout">
                <img class="tour-card-image-selector__preview" src="/assets/img/marketing_tour.png" alt="" aria-hidden="true" loading="lazy" />
                <div class="tour-card-image-selector__content">
                  <button class="btn btn-ghost tour-card-image-selector__clear" type="button" data-tour-card-clear-images data-i18n-id="tour.card_images.clear">Clear selection</button>
                  <label class="backend-checkbox-item tour-variant-published-toggle" for="tourVariantPublished">
                    <input id="tourVariantPublished" type="checkbox" />
                    <span data-i18n-id="tour.published_on_webpage">Show on web page</span>
                  </label>
                  <div class="tour-card-image-selector__thumbs" data-tour-card-image-thumbs></div>
                </div>
              </div>
            </div>

            <div class="tour-variant-map-row">
              <div id="tourVariantMapPreview" class="tour-variant-map-preview-mount"></div>
              <div id="tourVariantDaySummary" class="tour-variant-day-summary" aria-label="Tour Variant days" data-i18n-aria-label-id="backend.tour_variant.day_summary"></div>
            </div>

            <div
              id="tourVariantCustomizerOverlay"
              class="tour-variant-customizer-overlay"
              role="dialog"
              aria-modal="true"
              aria-label="Route customizer"
              data-i18n-aria-label-id="backend.tour_variant.route_customizer"
              hidden
            >
              <div id="tourVariantCustomizer" class="tour-variant-customizer-mount"></div>
              <button class="btn btn-ghost tour-variant-customizer-close" id="tourVariantCustomizerClose" type="button" data-i18n-id="common.close">Close</button>
            </div>

            <div class="tour-variant-grid">
              <section class="tour-variant-panel">
                <div class="tour-variant-panel__body">
                  <div class="tour-variant-fields">
                    <div class="field">
                      <label for="tourVariantPriority" data-i18n-id="backend.tour_variant.priority">Priority</label>
                      <input id="tourVariantPriority" type="number" min="0" max="100" step="1" />
                    </div>
                    <div class="field">
                      <label for="tourVariantSeasonStart" data-i18n-id="backend.tour_variant.season_start_month">Season start month</label>
                      <select id="tourVariantSeasonStart">
                        <option value=""></option>
                      </select>
                    </div>
                    <div class="field">
                      <label for="tourVariantSeasonEnd" data-i18n-id="backend.tour_variant.season_end_month">Season end month</label>
                      <select id="tourVariantSeasonEnd">
                        <option value=""></option>
                      </select>
                    </div>
                    <div class="field field--wide">
                      <label for="tourVariantShortDescription" data-i18n-id="backend.tour_variant.short_description">Short description</label>
                      <textarea id="tourVariantShortDescription" rows="3"></textarea>
                    </div>
                    <div class="field field--wide">
                      <label data-i18n-id="backend.tour_variant.styles">Styles</label>
                      <div id="tourVariantStyles" class="tour-variant-style-grid"></div>
                    </div>
                  </div>
                </div>
              </section>
            </div>

            <details class="tour-variant-panel tour-variant-collapsible" open>
              <summary data-i18n-id="backend.tour_variant.arrival_and_departure">Arrival and Departure</summary>
              <div class="tour-variant-collapsible__body tour-variant-boundary-fields">
                <h3 class="tour-variant-boundary-heading tour-variant-boundary-heading--arrival" data-i18n-id="backend.tour_variant.arrival">Arrival</h3>
                <div class="field tour-variant-boundary-field--arrival tour-variant-boundary-field--mode">
                  <label for="tourVariantArrivalMode" data-i18n-id="backend.tour_variant.mode">Mode</label>
                  <select id="tourVariantArrivalMode">
