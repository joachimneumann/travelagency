<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AsiaTravelPlan Tour</title>
    <meta name="description" content="AsiaTravelPlan backend tour details" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/styles.css?v=3" />
  </head>
  <body>
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="backend.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="assets/img/logo-asiatravelplan.svg" alt="AsiaTravelPlan" width="320" height="76" />
        </a>

        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <h1 class="section-title" id="tour_title">Tour</h1>
          <p class="section-booking" id="tour_subtitle">Loading tour...</p>

          <div id="tour_error" class="backend-message" role="alert" aria-live="assertive"></div>

          <form id="tour_form" class="backend-tour-form">
            <div class="field full">
              <div class="tour-hero-row">
                <img id="tour_hero_image" src="" alt="Tour hero" class="tour-hero-image" />
                <div class="tour-hero-actions">
                  <button class="btn btn-ghost" id="tour_change_image_btn" type="button">Change image</button>
                  <p class="micro">Image is converted to WebP and resized to max 1000px automatically.</p>
                </div>
              </div>
              <input id="tour_image_upload" name="tour_image_upload" type="file" accept="image/*" class="u-file-input-hidden" />
            </div>
            <div class="field full">
              <label for="tour_short_description">Description</label>
              <textarea id="tour_short_description" name="short_description" rows="3"></textarea>
            </div>
            <div class="field full">
              <label for="tour_highlights">Highlights (one per line)</label>
              <textarea id="tour_highlights" name="highlights" rows="4"></textarea>
            </div>
            <div class="field">
              <label for="tour_seasonality_start_month">Seasonality Start Month</label>
              <select id="tour_seasonality_start_month" name="seasonality_start_month">
                <option value=""></option>
              </select>
            </div>
            <div class="field">
              <label for="tour_seasonality_end_month">Seasonality End Month</label>
              <select id="tour_seasonality_end_month" name="seasonality_end_month">
                <option value=""></option>
              </select>
            </div>
            <div class="field">
              <label for="tour_titleInput">Title</label>
              <input id="tour_titleInput" name="title" type="text" required />
              <div id="tour_titleError" class="form-error" role="alert" aria-live="polite"></div>
            </div>
            <div class="field">
              <span class="field-label">Destinations</span>
              <input id="tour_destinations" name="destinations" type="hidden" required />
              <div id="tour_destination_choices" class="backend-checkbox-grid"></div>
            </div>
            <div class="field">
              <span class="field-label">Tour Styles</span>
              <input id="tour_styles" name="styles" type="hidden" required />
              <div id="tour_style_choices" class="backend-checkbox-grid"></div>
            </div>
            <div class="field">
              <label for="tour_travel_duration_days">Duration (Days)</label>
              <input id="tour_travel_duration_days" name="travel_duration_days" type="number" min="1" step="1" />
            </div>
            <div class="field">
              <label for="tour_budget_lower_usd">Budget Lower USD</label>
              <input id="tour_budget_lower_usd" name="budget_lower_usd" type="number" min="0" step="1" />
            </div>
            <div class="field">
              <label for="tour_priority">Web page ranking priority (0-100)</label>
              <input id="tour_priority" name="priority" type="number" min="0" max="100" step="1" />
            </div>
            <div class="field">
              <label for="tour_rating">Rating</label>
              <input id="tour_rating" name="rating" type="number" min="0" max="5" step="0.1" />
            </div>
            <div class="field full">
              <label for="tour_id">ID (read-only)</label>
              <input id="tour_id" name="id" type="text" readonly />
            </div>
            <div class="backend-controls">
              <button class="btn btn-primary" id="tour_save_btn" type="submit">Save Changes</button>
              <a class="btn btn-ghost" id="tour_cancel_btn" href="backend.html">Cancel</a>
              <span id="tour_formStatus" class="micro"></span>
            </div>
          </form>
        </div>
      </section>
    </main>

    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/nav.js?v=20260311a";
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "tours" });
    </script>
    <script type="module" src="frontend/scripts/pages/tour.js?v=20260311a"></script>
  </body>
</html>
