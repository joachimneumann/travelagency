<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Traveler Details | AsiaTravelPlan</title>
    <meta name="description" id="traveler_details_meta_description" content="Fill in your traveler details for AsiaTravelPlan." />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" href="/assets/img/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/assets/img/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" sizes="180x180" />
    <script>
      {
        const hostname = window.location.hostname;
        const environmentIcon = ["localhost", "127.0.0.1", "::1", "[::1]"].includes(hostname)
          ? { href: "/assets/img/local.small.png", sizes: "200x200" }
          : hostname === "staging.asiatravelplan.com"
            ? { href: "/assets/img/staging.small.png", sizes: "150x150" }
            : null;
        if (environmentIcon) {
          document.querySelector('link[rel="icon"][sizes="32x32"]')?.setAttribute("href", environmentIcon.href);
          document.querySelector('link[rel="icon"][sizes="16x16"]')?.setAttribute("href", environmentIcon.href);
          const appleTouchIcon = document.querySelector('link[rel="apple-touch-icon"]');
          appleTouchIcon?.setAttribute("href", environmentIcon.href);
          appleTouchIcon?.setAttribute("sizes", environmentIcon.sizes);
        }
      }
    </script>
    <script>
      if (!window.ASIATRAVELPLAN_API_BASE && ["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        window.ASIATRAVELPLAN_API_BASE = window.location.origin;
      }
    </script>
    <script>
      if (["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        const diagnosticsScript = document.createElement("script");
        diagnosticsScript.src = "/frontend/scripts/shared/localhost_diagnostics.js";
        document.head.append(diagnosticsScript);
      }
    </script>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body class="traveler-details-page">
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" href="/index.html" aria-label="AsiaTravelPlan home">
          <img class="brand-logo" src="/assets/generated/runtime/brand-logo.png" alt="AsiaTravelPlan" width="165" height="68" />
        </a>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container traveler-details-shell">
          <article class="panel traveler-details-card">
            <p class="traveler-details-kicker" id="traveler_details_kicker">Traveler details</p>
            <h1 class="section-title" id="traveler_details_title">Tell us about your travelers</h1>
            <p class="traveler-details-intro" id="traveler_details_intro">This information helps us prepare your journey smoothly. If you prefer, you can also provide it later, at the beginning of your trip. The link to this page expires in 24 hours to protect your privacy.</p>

            <div id="traveler_details_error" class="backend-message" role="alert" aria-live="assertive" hidden></div>
            <p id="traveler_details_loading" class="traveler-details-loading">Loading traveler details…</p>

            <div id="traveler_details_content" hidden>
              <form id="traveler_details_form" class="traveler-details-form" novalidate>
                <div id="traveler_details_list" class="traveler-details-list"></div>
                <div class="traveler-details-actions" id="traveler_details_actions">
                  <button class="btn btn-primary" id="traveler_details_save_btn" type="submit">Send traveler details to Asia Travel Plan</button>
                </div>
                <span id="traveler_details_status" class="traveler-details-form__status" aria-live="polite"></span>
              </form>
            </div>
          </article>
        </div>
      </section>
    </main>

    <script type="module" src="frontend/scripts/pages/traveler_details.js"></script>
  </body>
</html>
