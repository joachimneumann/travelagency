<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n-id="tour.page_title">AsiaTravelPlan Tour</title>
    <meta name="description" content="AsiaTravelPlan backend tour details" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <script>
      if (!window.ASIATRAVELPLAN_API_BASE && ["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        window.ASIATRAVELPLAN_API_BASE = window.location.origin;
      }
    </script>
    <script src="/frontend/scripts/shared/localhost_diagnostics.js"></script>
    <style>
      .tour-picture-editor {
        display: grid;
        gap: 1rem;
      }

      .tour-picture-list {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 1rem;
      }

      .tour-picture-card {
        display: grid;
        grid-template-columns: clamp(180px, 24vw, 260px) minmax(0, 1fr) auto;
        gap: 1rem;
        align-items: center;
        padding: 1rem;
        border: 1px solid var(--line);
        border-radius: 1rem;
        background: var(--surface);
      }

      .tour-picture-card__frame {
        position: relative;
      }

      .tour-picture-card__image {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        border: 1px solid var(--line);
        border-radius: 1rem;
        background: var(--surface-muted);
        display: block;
      }

      .tour-picture-card__meta {
        display: grid;
        gap: 0.35rem;
        min-width: 0;
        align-self: center;
      }

      .tour-picture-card__actions {
        display: contents;
      }

      .tour-picture-card__name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: normal;
        overflow-wrap: anywhere;
        min-width: 0;
        color: var(--text-strong);
      }

      .tour-picture-card__order {
        color: var(--text-soft);
      }

      .tour-picture-card__remove {
        align-self: center;
      }

      .tour-picture-empty {
        border: 1px dashed var(--line);
        border-radius: 1rem;
        padding: 1rem;
        background: var(--surface-muted);
      }

      .tour-picture-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.75rem 1rem;
      }

      .tour-reel-editor {
        display: grid;
        gap: 1rem;
      }

      .tour-reel-card {
        display: grid;
        grid-template-columns: clamp(180px, 24vw, 260px) minmax(0, 1fr) auto;
        gap: 1rem;
        align-items: center;
        padding: 1rem;
        border: 1px solid var(--line);
        border-radius: 1rem;
        background: var(--surface);
      }

      .tour-reel-card__preview {
        width: 100%;
        aspect-ratio: 9 / 16;
        border: 1px solid var(--line);
        border-radius: 1rem;
        background: var(--surface-muted);
        object-fit: cover;
        display: block;
      }

      .tour-reel-card__meta {
        display: grid;
        gap: 0.35rem;
        min-width: 0;
      }

      .tour-reel-card__name {
        overflow-wrap: anywhere;
        color: var(--text-strong);
      }

      .tour-reel-card__hint {
        color: var(--text-soft);
      }

      .tour-reel-empty {
        border: 1px dashed var(--line);
        border-radius: 1rem;
        padding: 1rem;
        background: var(--surface-muted);
      }

      @media (max-width: 720px) {
        .tour-picture-card {
          grid-template-columns: minmax(0, 1fr);
        }

        .tour-picture-card__frame {
          max-width: 320px;
        }

        .tour-picture-card__remove {
          justify-self: start;
        }

        .tour-reel-card {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="booking-detail-page tour-detail-page">
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="bookings.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="/assets/generated/runtime/brand-logo.png" alt="AsiaTravelPlan" width="165" height="68" />
        </a>

        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div class="booking-detail-page__bar-top-gap" aria-hidden="true"></div>
          <div class="booking-dirty-bar-row">
            <div class="booking-dirty-bar" id="tour_dirty_bar">
              <div class="booking-dirty-bar__panel">
                <div class="booking-dirty-bar__actions">
                  <a class="btn btn-ghost" id="tour_cancel_btn" href="bookings.html" data-i18n-id="tour.cancel">Cancel</a>
                  <button class="btn btn-primary" id="tour_save_btn" type="submit" form="tour_form" data-i18n-id="tour.save_changes">Save Changes</button>
                  <span id="tour_formStatus" class="micro booking-inline-status" role="status" aria-live="polite"></span>
                </div>
              </div>
            </div>
            <button class="booking-dirty-bar-row__back" id="backToBackend" type="button" aria-label="Back to tours">Back</button>
          </div>
          <div class="booking-detail-page__bar-gap" aria-hidden="true"></div>
          <div class="booking-detail-page__scroll">
            <div class="booking-page-shell">
              <div class="tour-header__title-row">
                <h1 class="section-title tour-header__title" id="tour_title">Tour</h1>
              </div>
              <div id="tour_titleError" class="form-error" role="alert" aria-live="polite"></div>
              <p class="section-booking" id="tour_subtitle" data-i18n-id="tour.subtitle_loading">Loading tour...</p>

              <div id="tour_error" class="backend-message" role="alert" aria-live="assertive"></div>

              <form id="tour_form" class="backend-tour-form">
                <div class="field full">
                  <div class="tour-picture-editor">
                    <div id="tour_picture_list" class="tour-picture-list" aria-live="polite"></div>
                    <div class="tour-picture-toolbar">
                      <button class="btn btn-ghost" id="tour_add_picture_btn" type="button" data-i18n-id="tour.add_picture">Add picture</button>
                      <p class="micro" data-i18n-id="tour.picture_help">Pictures are converted to WebP and resized to max 1000px automatically.</p>
                    </div>
                  </div>
                  <input id="tour_picture_upload" name="tour_picture_upload" type="file" accept="image/*" multiple class="u-file-input-hidden" />
                </div>
                <div class="field full">
                  <div class="tour-reel-editor">
                    <div id="tour_reel_video_card" aria-live="polite"></div>
                    <div class="tour-picture-toolbar">
                      <button class="btn btn-ghost" id="tour_add_reel_btn" type="button">Upload reel video</button>
                      <p class="micro">One reel video per tour. Uploading a new file replaces the previous reel and stores it as a normalized portrait MP4.</p>
                    </div>
                  </div>
                  <input id="tour_reel_upload" name="tour_reel_upload" type="file" accept="video/*" class="u-file-input-hidden" />
                </div>
                <div class="field">
                  <label for="tour_seasonality_start_month" data-i18n-id="tour.seasonality_start">Seasonality Start Month</label>
                  <select id="tour_seasonality_start_month" name="seasonality_start_month">
                    <option value=""></option>
                  </select>
                </div>
                <div class="field">
                  <label for="tour_seasonality_end_month" data-i18n-id="tour.seasonality_end">Seasonality End Month</label>
                  <select id="tour_seasonality_end_month" name="seasonality_end_month">
                    <option value=""></option>
                  </select>
                </div>
                <div class="field">
                  <span class="field-label" data-i18n-id="tour.destinations_label">Destinations</span>
                  <input id="tour_destinations" name="destinations" type="hidden" required />
                  <div id="tour_destination_choices" class="backend-checkbox-grid"></div>
                </div>
                <div class="field">
                  <span class="field-label" data-i18n-id="tour.styles_label">Tour Styles</span>
                  <input id="tour_styles" name="styles" type="hidden" required />
                  <div id="tour_style_choices" class="backend-checkbox-grid"></div>
                </div>
                <div class="field">
                  <label for="tour_priority" data-i18n-id="tour.priority_label">Web page ranking priority (0-100)</label>
                  <input id="tour_priority" name="priority" type="number" min="0" max="100" step="1" />
                </div>
                <div class="field full">
                  <div id="tour_localized_content_editor"></div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="booking-page-overlay" id="tour_translate_overlay" hidden aria-hidden="true">
      <div class="booking-page-overlay__panel" role="status" aria-live="assertive">
        <span class="booking-page-overlay__spinner" aria-hidden="true"></span>
        <span class="booking-page-overlay__text" id="tour_translate_overlay_text" data-i18n-id="tour.translation.translating_all_overlay">Translating all languages. Please wait.</span>
      </div>
    </div>

    <script src="shared/generated/language_catalog.global.js"></script>
    <script src="frontend/scripts/shared/backend_i18n.js"></script>
    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/nav.js";
      await (window.__BACKEND_I18N_PROMISE || Promise.resolve());
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "tours" });
    </script>
    <script type="module" src="frontend/scripts/pages/tour.js"></script>
  </body>
</html>
