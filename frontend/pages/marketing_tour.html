<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n-id="tour.page_title">AsiaTravelPlan Tour</title>
    <meta name="description" content="AsiaTravelPlan backend tour details" />
    <link rel="icon" href="/assets/img/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/assets/img/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" sizes="180x180" />
    <script>
      {
        const hostname = window.location.hostname;
        const isPrivateNetworkHost = /^(10\.|192\.168\.|172\.(1[6-9]|2\d|3[0-1])\.)/.test(hostname);
        const isLocalEnvironment = ["localhost", "127.0.0.1", "::1", "[::1]"].includes(hostname) || isPrivateNetworkHost;
        const isStagingEnvironment = hostname === "staging.asiatravelplan.com";
        const environmentIcon = isLocalEnvironment
          ? { href: "/assets/img/local.small.png", sizes: "200x200" }
          : isStagingEnvironment
            ? { href: "/assets/img/staging.small.png", sizes: "150x150" }
            : null;
        const environmentAppleTouchIcon = isLocalEnvironment
          ? { href: "/assets/img/local-home-screen-icon.png", sizes: "180x180" }
          : isStagingEnvironment
            ? { href: "/assets/img/staging-home-screen-icon.png", sizes: "180x180" }
            : null;
        if (environmentIcon) {
          document.querySelector('link[rel="icon"][sizes="32x32"]')?.setAttribute("href", environmentIcon.href);
          document.querySelector('link[rel="icon"][sizes="16x16"]')?.setAttribute("href", environmentIcon.href);
        }
        if (environmentAppleTouchIcon) {
          const appleTouchIcon = document.querySelector('link[rel="apple-touch-icon"]');
          appleTouchIcon?.setAttribute("href", environmentAppleTouchIcon.href);
          appleTouchIcon?.setAttribute("sizes", environmentAppleTouchIcon.sizes);
        }
      }
    </script>
    <script>
      if (!window.ASIATRAVELPLAN_API_BASE && ["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        window.ASIATRAVELPLAN_API_BASE = window.location.origin;
      }
    </script>
    <script>
      if (["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        const diagnosticsScript = document.createElement("script");
        diagnosticsScript.src = "/frontend/scripts/shared/localhost_diagnostics.js";
        document.head.append(diagnosticsScript);
      }
    </script>
    <style>
      .tour-media-toolbar {
        display: grid;
        justify-items: center;
        align-items: center;
        gap: 0.5rem;
        text-align: center;
      }

      .tour-media-toolbar .micro {
        max-width: min(100%, 34rem);
        margin: 0;
      }

      .tour-reel-editor {
        --tour-media-preview-width: clamp(150px, 18vw, 220px);
        display: grid;
        gap: 1rem;
      }

      .tour-reel-card {
        display: grid;
        grid-template-columns: minmax(0, var(--tour-media-preview-width)) auto;
        gap: 1rem;
        align-items: center;
        justify-content: center;
        width: fit-content;
        max-width: 100%;
        margin-inline: auto;
        padding: 1rem;
        border: 1px solid var(--line);
        border-radius: 1rem;
        background: var(--surface);
      }

      .tour-reel-card__media {
        grid-column: 1;
        grid-row: 1;
        display: grid;
        gap: 0.5rem;
        justify-items: center;
        justify-self: center;
        width: min(100%, var(--tour-media-preview-width));
        min-width: 0;
      }

      .tour-reel-card__frame {
        width: 100%;
      }

      .tour-reel-card__preview {
        width: 100%;
        aspect-ratio: 9 / 16;
        border: 1px solid var(--line);
        border-radius: 1rem;
        background: var(--surface-muted);
        cursor: pointer;
        object-fit: cover;
        display: block;
      }

      .tour-reel-card__filename {
        max-width: 100%;
        color: var(--text-strong);
        overflow-wrap: anywhere;
        text-align: center;
        user-select: text;
      }

      .tour-reel-card__remove {
        grid-column: 2;
        grid-row: 1;
        align-self: center;
        justify-self: start;
      }

      .tour-reel-empty {
        border: 1px dashed var(--line);
        border-radius: 1rem;
        padding: 1rem;
        background: var(--surface-muted);
      }

      .tour-card-image-selector {
        display: grid;
        gap: 0.85rem;
        padding: 1rem;
        border: 1px solid var(--line);
        border-radius: 1rem;
        background: var(--surface);
      }

      .tour-card-image-selector__head {
        display: grid;
        gap: 0.2rem;
      }

      .tour-card-image-selector__title {
        font-weight: var(--font-weight-bold);
        color: var(--text-strong);
      }

      .tour-card-image-selector__hint {
        margin: 0;
      }

      .tour-card-image-selector__row {
        display: grid;
        gap: 0.45rem;
      }

      .tour-card-image-selector__label {
        font-size: var(--font-size-caption);
        font-weight: var(--font-weight-semibold);
        color: var(--text-muted-strong);
      }

      .tour-card-image-selector__thumbs {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }

      .tour-card-image-selector__thumb {
        position: relative;
        display: block;
        width: 60px;
        height: 60px;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 0.55rem;
        background: var(--surface-muted);
        overflow: hidden;
      }

      button.tour-card-image-selector__thumb:not(:disabled) {
        cursor: pointer;
      }

      .tour-card-image-selector__thumb img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .tour-card-image-selector__thumb.is-selected {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-tint);
      }

      .tour-card-image-selector__check {
        position: absolute;
        inset: auto 2px 2px auto;
        display: grid;
        place-items: center;
        width: 16px;
        height: 16px;
        border-radius: 999px;
        background: var(--accent);
        color: var(--surface);
        font-size: 0.72rem;
        font-weight: var(--font-weight-bold);
        line-height: 1;
      }

      .tour-card-image-selector__thumb:disabled,
      .tour-card-image-selector__thumb[aria-disabled="true"] {
        opacity: 0.58;
      }

      @media (max-width: 520px) {
        .tour-reel-card {
          grid-template-columns: minmax(0, 1fr);
          width: 100%;
        }

        .tour-reel-card__media {
          grid-column: 1;
          grid-row: auto;
          max-width: var(--tour-media-preview-width);
        }

        .tour-reel-card__remove {
          grid-column: 1;
          grid-row: auto;
          justify-self: center;
        }
      }
    </style>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="booking-detail-page tour-detail-page">
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="bookings.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="/assets/generated/runtime/brand-logo.png" alt="AsiaTravelPlan" width="165" height="68" />
        </a>

        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div class="booking-detail-page__bar-top-gap" aria-hidden="true"></div>
          <div class="booking-dirty-bar-row">
            <div class="booking-dirty-bar" id="tour_dirty_bar">
              <div class="booking-dirty-bar__panel">
                <div class="booking-dirty-bar__copy">
                  <strong id="tour_dirty_bar_title" data-i18n-id="booking.page_save.clean">No unsaved edits</strong>
                  <span class="micro booking-dirty-bar__summary" id="tour_dirty_bar_summary"></span>
                </div>
                <div class="booking-dirty-bar__actions">
                  <a class="btn btn-ghost" id="tour_cancel_btn" href="bookings.html" data-i18n-id="tour.cancel">Cancel</a>
                  <button class="btn btn-primary" id="tour_save_btn" type="submit" form="tour_form" data-i18n-id="tour.save_changes">Save Changes</button>
                  <span id="tour_formStatus" class="micro booking-inline-status" role="status" aria-live="polite"></span>
                </div>
              </div>
            </div>
            <button class="booking-dirty-bar-row__back" id="backToBackend" type="button" aria-label="Back to tours">Back</button>
          </div>
          <div class="booking-detail-page__bar-gap" aria-hidden="true"></div>
          <div class="booking-detail-page__scroll">
            <div class="booking-page-shell">
              <div class="tour-header__title-row">
                <h1 class="section-title tour-header__title" id="tour_title">Tour</h1>
              </div>
              <div id="tour_titleError" class="form-error" role="alert" aria-live="polite"></div>

              <div id="tour_error" class="backend-message" role="alert" aria-live="assertive"></div>

              <form id="tour_form" class="backend-tour-form">
                <div class="field full">
                  <div id="tour_card_image_selector" class="tour-card-image-selector"></div>
                </div>
                <div class="field full">
                  <div class="tour-reel-editor">
                    <div id="tour_reel_video_card" aria-live="polite"></div>
                    <div class="tour-media-toolbar">
                      <button class="btn btn-ghost" id="tour_add_reel_btn" type="button" data-i18n-id="tour.new_reel_video">New Reel</button>
                      <p class="micro" data-i18n-id="tour.reel_video_help">One reel video per tour. Uploading a new file replaces the previous reel and stores it as a normalized portrait MP4.</p>
                    </div>
                  </div>
                  <input id="tour_reel_upload" name="tour_reel_upload" type="file" accept="video/*" class="u-file-input-hidden" />
                </div>
                <div class="field full">
                  <label class="backend-checkbox-item" for="tour_published_on_webpage">
                    <input id="tour_published_on_webpage" name="published_on_webpage" type="checkbox" checked />
                    <span data-i18n-id="tour.published_on_webpage">Published on webpage</span>
                  </label>
                </div>
                <div class="field">
                  <label for="tour_seasonality_start_month" data-i18n-id="tour.seasonality_start">Seasonality Start Month</label>
                  <select id="tour_seasonality_start_month" name="seasonality_start_month">
                    <option value=""></option>
                  </select>
                </div>
                <div class="field">
                  <label for="tour_seasonality_end_month" data-i18n-id="tour.seasonality_end">Seasonality End Month</label>
                  <select id="tour_seasonality_end_month" name="seasonality_end_month">
                    <option value=""></option>
                  </select>
                </div>
                <div class="field full">
                  <span class="field-label" data-i18n-id="tour.styles_label">Tour Styles</span>
                  <input id="tour_styles" name="styles" type="hidden" required />
                  <div id="tour_style_choices" class="backend-checkbox-grid"></div>
                </div>
                <div class="field full">
                  <div id="tour_destination_scope_editor"></div>
                </div>
                <div class="field">
                  <label for="tour_priority" data-i18n-id="tour.priority_label">Web page ranking priority (0-100)</label>
                  <input id="tour_priority" name="priority" type="number" min="0" max="100" step="1" />
                </div>
                <div class="field full">
                  <div id="tour_localized_content_editor"></div>
                </div>
                <div class="field full">
                  <article id="travel_plan_panel" class="booking-section is-open travel-plan-editor--marketing-tour">
                    <div class="booking-section__head">
                      <button class="booking-section__summary booking-section__summary--inline-pad-16" id="travel_plan_panel_summary" type="button"></button>
                    </div>
                    <div class="booking-section__body">
                      <div class="backend-controls travel-plan-actions">
                        <span id="travel_plan_status" class="micro booking-inline-status"></span>
                      </div>
                      <div id="travel_plan_editor"></div>
                    </div>
                  </article>
                </div>
                <div class="field full">
                  <article id="tour_travel_plan_translation_section" class="booking-section is-open">
                    <div class="booking-section__head">
                      <button id="tour_travel_plan_translation_summary" class="booking-section__summary booking-section__summary--inline-pad-16" type="button">
                        <span data-translation-summary-title data-i18n-id="tour.travel_plan_translation.section_title">Translations</span>
                      </button>
                    </div>
                    <div class="booking-section__body">
                      <div id="tour_travel_plan_translation_panel" class="tour-travel-plan-translation"></div>
                    </div>
                  </article>
                </div>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="booking-page-overlay" id="tour_translate_overlay" hidden aria-hidden="true">
      <div class="booking-page-overlay__panel" role="status" aria-live="assertive">
        <span class="booking-page-overlay__spinner" aria-hidden="true"></span>
        <span class="booking-page-overlay__text" id="tour_translate_overlay_text" data-i18n-id="tour.translation.translating_all_overlay">Translating all languages. Please wait.</span>
      </div>
    </div>

    <div
      class="modal travel-plan-image-preview-modal"
      id="travel_plan_image_preview_modal"
      hidden
      role="dialog"
      aria-modal="true"
      aria-label="Travel plan image preview"
      data-i18n-aria-label-id="booking.travel_plan.image_preview"
    >
      <div class="modal-panel travel-plan-image-preview-modal__panel" role="document">
        <div class="modal-head travel-plan-image-preview-modal__head">
          <div></div>
          <button class="btn btn-ghost" id="travel_plan_image_preview_close_btn" type="button" aria-label="Close image preview" data-i18n-aria-label-id="booking.travel_plan.close_image_preview">&times;</button>
        </div>
        <div class="modal-body travel-plan-image-preview-modal__body">
          <img id="travel_plan_image_preview_image" class="travel-plan-image-preview-modal__image" alt="" />
        </div>
      </div>
    </div>

    <div
      class="modal travel-plan-library-modal"
      id="travel_plan_service_library_modal"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="travel_plan_service_library_title"
    >
      <div class="modal-panel travel-plan-library-modal__panel" role="document">
        <div class="modal-head travel-plan-library-modal__head">
          <div>
            <h2 id="travel_plan_service_library_title" data-i18n-id="booking.travel_plan.existing_services">Existing services</h2>
          </div>
          <button class="btn btn-ghost offer-remove-btn" id="travel_plan_service_library_close_btn" type="button" aria-label="Close insert service dialog" data-i18n-aria-label-id="booking.travel_plan.close_insert_service_dialog">&times;</button>
        </div>
        <div class="modal-body travel-plan-library-modal__body">
          <div class="travel-plan-library-modal__filters">
            <div class="field">
              <label for="travel_plan_service_library_query" data-i18n-id="common.search">Search</label>
              <input id="travel_plan_service_library_query" type="search" placeholder="Search services, bookings, locations..." data-i18n-placeholder-id="booking.travel_plan.search_placeholder" />
            </div>
            <div class="field">
              <label for="travel_plan_service_library_kind" data-i18n-id="booking.travel_plan.kind_label">Kind</label>
              <select id="travel_plan_service_library_kind"></select>
            </div>
            <div class="travel-plan-library-modal__search-action">
              <button class="btn btn-primary" id="travel_plan_service_library_search_btn" type="button" data-i18n-id="common.search">Search</button>
            </div>
          </div>
          <div id="travel_plan_service_library_status" class="micro booking-inline-status"></div>
          <div id="travel_plan_service_library_results" class="travel-plan-library-modal__results"></div>
        </div>
      </div>
    </div>

    <input id="travel_plan_service_image_input" type="file" accept="image/*" hidden />

    <script src="shared/generated/language_catalog.global.js"></script>
    <script src="frontend/scripts/shared/backend_i18n.js"></script>
    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/nav.js";
      await (window.__BACKEND_I18N_PROMISE || Promise.resolve());
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "tours" });
    </script>
    <script type="module" src="frontend/scripts/pages/tour.js"></script>
  </body>
</html>
