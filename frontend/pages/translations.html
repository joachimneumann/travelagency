<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Translations</title>
    <meta name="description" content="AsiaTravelPlan translation management" />
    <link rel="icon" href="/assets/img/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/assets/img/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" sizes="180x180" />
    <script>
      {
        const hostname = window.location.hostname;
        const isPrivateNetworkHost = /^(10\.|192\.168\.|172\.(1[6-9]|2\d|3[0-1])\.)/.test(hostname);
        const isLocalEnvironment = ["localhost", "127.0.0.1", "::1", "[::1]"].includes(hostname) || isPrivateNetworkHost;
        const isStagingEnvironment = hostname === "staging.asiatravelplan.com";
        const environmentIcon = isLocalEnvironment
          ? { href: "/assets/img/local.small.png", sizes: "200x200" }
          : isStagingEnvironment
            ? { href: "/assets/img/staging.small.png", sizes: "150x150" }
            : null;
        const environmentAppleTouchIcon = isLocalEnvironment
          ? { href: "/assets/img/local-home-screen-icon.png", sizes: "180x180" }
          : isStagingEnvironment
            ? { href: "/assets/img/staging-home-screen-icon.png", sizes: "180x180" }
            : null;
        if (environmentIcon) {
          document.querySelector('link[rel="icon"][sizes="32x32"]')?.setAttribute("href", environmentIcon.href);
          document.querySelector('link[rel="icon"][sizes="16x16"]')?.setAttribute("href", environmentIcon.href);
        }
        if (environmentAppleTouchIcon) {
          const appleTouchIcon = document.querySelector('link[rel="apple-touch-icon"]');
          appleTouchIcon?.setAttribute("href", environmentAppleTouchIcon.href);
          appleTouchIcon?.setAttribute("sizes", environmentAppleTouchIcon.sizes);
        }
      }
    </script>
    <script>
      if (!window.ASIATRAVELPLAN_API_BASE && ["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        window.ASIATRAVELPLAN_API_BASE = window.location.origin;
      }
    </script>
    <script>
      if (["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        const diagnosticsScript = document.createElement("script");
        diagnosticsScript.src = "/frontend/scripts/shared/localhost_diagnostics.js";
        document.head.append(diagnosticsScript);
      }
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="backend-list-page backend-translations-page">
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="bookings.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="/assets/generated/runtime/brand-logo.png" alt="AsiaTravelPlan" width="165" height="68" />
        </a>
        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div id="backendError" class="backend-message" role="alert" aria-live="assertive"></div>

          <section class="backend-section translations-workspace" id="translationsPanel" hidden>
            <div class="translations-workspace__head">
              <div class="translations-workspace__actions">
                <div class="translations-workspace__buttons">
                  <button class="btn btn-primary" id="translationsTranslateBtn" type="button">Translate</button>
                  <button class="btn btn-primary" id="translationsApplyBtn" type="button">Publish</button>
                </div>
                <p class="micro translations-workspace__status" id="translationsStatus" role="status" aria-live="polite">1 string needs translation before publishing.</p>
              </div>
            </div>

            <div class="translations-sections" id="translationsSections"></div>

            <details class="translations-advanced">
              <summary>Advanced retranslation and cache invalidation</summary>
              <p class="micro">Use these only when cached machine translations are poor. Manual overrides are preserved by the sync scripts.</p>
              <div class="translations-advanced__actions">
                <button class="btn btn-ghost" id="translationsRetranslateFrontendAllBtn" type="button">Retranslate all customer-facing languages</button>
                <button class="btn btn-ghost" id="translationsRetranslateBackendViBtn" type="button">Retranslate backend Vietnamese</button>
              </div>
            </details>
          </section>
        </div>
      </section>
    </main>

    <div class="booking-page-overlay" id="translationsApplyOverlay" hidden aria-hidden="true">
      <div class="booking-page-overlay__panel translations-apply-overlay__panel" role="status" aria-live="assertive">
        <span class="booking-page-overlay__spinner" aria-hidden="true"></span>
        <span class="booking-page-overlay__text" id="translationsApplyOverlayText" data-i18n-id="backend.translations.applying_overlay">Publishing translations. Please wait.</span>
        <pre class="translations-apply-log" id="translationsApplyLog"></pre>
      </div>
    </div>

    <script src="shared/generated/language_catalog.global.js"></script>
    <script src="frontend/scripts/shared/backend_i18n.js"></script>
    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/nav.js";
      await (window.__BACKEND_I18N_PROMISE || Promise.resolve());
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "translations" });
    </script>
    <script type="module" src="frontend/scripts/pages/translations.js"></script>
  </body>
</html>
