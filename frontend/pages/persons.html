<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n-id="persons.page_title">AsiaTravelPlan Persons</title>
    <meta name="description" content="AsiaTravelPlan person search" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <script>
      if (!window.ASIATRAVELPLAN_API_BASE && ["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        window.ASIATRAVELPLAN_API_BASE = "http://localhost:8787";
      }
    </script>
    <link rel="stylesheet" href="assets/css/styles.css?v=b7baca7c60a0" />
  </head>
  <body>
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="backend.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="assets/img/logo-asiatravelplan.svg" alt="AsiaTravelPlan" width="320" height="76" />
        </a>

        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div id="personsError" class="backend-message" role="alert" aria-live="assertive"></div>

          <section class="backend-section">
            <h1 class="section-title u-title-medium" data-i18n-id="persons.heading">Persons</h1>
            <p class="micro" style="margin-bottom: 0.85rem;" data-i18n-id="persons.description">Search booking-owned persons and open their related bookings.</p>

            <div class="backend-controls">
              <div class="field" style="flex: 1;">
                <input id="personsSearch" type="search" placeholder="name, email, phone..." data-i18n-placeholder-id="persons.search_placeholder" />
              </div>
              <button class="btn btn-primary" id="personsSearchBtn" type="button" data-i18n-id="common.search">Search</button>
              <button class="btn btn-ghost" id="personsClearBtn" type="button" data-i18n-id="common.clear">Clear</button>
              <span id="personsCountInfo" class="micro"></span>
            </div>

            <p class="micro" id="personsSearchNote" style="margin-top: 0.75rem;" data-i18n-id="persons.note">Persons are read directly from bookings. Each row represents one booking person.</p>

            <div class="backend-table-wrap" style="margin-top: 1rem;">
              <table class="backend-table" id="personsTable"></table>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="shared/generated/language_catalog.global.js?v=b7baca7c60a0"></script>
    <script src="frontend/scripts/shared/backend_i18n.js?v=b7baca7c60a0"></script>
    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/nav.js?v=b7baca7c60a0";
      await (window.__BACKEND_I18N_PROMISE || Promise.resolve());
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "persons" });
    </script>
    <script type="module" src="frontend/scripts/pages/persons.js?v=b7baca7c60a0"></script>
  </body>
</html>
