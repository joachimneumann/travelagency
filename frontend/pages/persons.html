<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AsiaTravelPlan Persons</title>
    <meta name="description" content="AsiaTravelPlan person search" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/styles.css?v=ce37aa7dfc76" />
  </head>
  <body>
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="backend.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="assets/img/logo-asiatravelplan.svg" alt="AsiaTravelPlan" width="320" height="76" />
        </a>

        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div id="personsError" class="backend-message" role="alert" aria-live="assertive"></div>

          <section class="backend-section">
            <h1 class="section-title u-title-medium">Persons</h1>
            <p class="micro" style="margin-bottom: 0.85rem;">Search booking-owned persons and open their related bookings.</p>

            <div class="backend-controls">
              <div class="field" style="flex: 1;">
                <input id="personsSearch" type="search" placeholder="name, email, phone..." />
              </div>
              <button class="btn btn-primary" id="personsSearchBtn" type="button">Search</button>
              <button class="btn btn-ghost" id="personsClearBtn" type="button">Clear</button>
              <span id="personsCountInfo" class="micro"></span>
            </div>

            <p class="micro" id="personsSearchNote" style="margin-top: 0.75rem;">Persons are read directly from bookings. Each row represents one booking person.</p>

            <div class="backend-table-wrap" style="margin-top: 1rem;">
              <table class="backend-table" id="personsTable"></table>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/nav.js?v=ce37aa7dfc76";
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "persons" });
    </script>
    <script type="module" src="frontend/scripts/pages/persons.js?v=ce37aa7dfc76"></script>
  </body>
</html>
