<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AsiaTravelPlan Booking</title>
    <meta name="description" content="AsiaTravelPlan booking detail" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/styles.css?v=3" />
  </head>
  <body class="booking-detail-page">
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="backend.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="assets/img/logo-asiatravelplan.svg" alt="AsiaTravelPlan" width="320" height="76" />
        </a>

        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div class="booking-hero">
            <div class="booking-hero__photo" aria-hidden="true">
              <img class="booking-hero__photo-image" id="booking_hero_image" src="assets/img/profile_person.png" alt="" />
            </div>
            <div class="booking-hero__copy">
              <p class="booking-hero__tour" id="detail_tour_title" hidden>Tour</p>
              <h1 class="booking-hero__name" id="detail_title">Booking</h1>
              <div class="booking-hero__id-row">
                <p class="booking-hero__id" id="detail_sub_title">ID: -</p>
                <button class="booking-hero__id-copy" id="booking_hero_copy_btn" type="button">copy</button>
                <span class="booking-hero__id-copy-status" id="booking_hero_copy_status" aria-live="polite"></span>
              </div>
            </div>
          </div>

          <div id="detail_error" class="backend-message" role="alert" aria-live="assertive"></div>

          <article id="booking_actions_panel" style="margin-bottom: 1rem;">
            <div class="backend-controls">
              <div class="field">
                <label for="booking_name_input">Booking name</label>
                <div class="backend-controls" style="align-items: center; gap: 0.55rem;">
                  <input id="booking_name_input" type="text" placeholder="Booking name" style="flex: 1;" />
                  <button class="btn btn-primary" id="booking_name_save_btn" type="button">update</button>
                </div>
              </div>
            </div>

            <div class="backend-controls">
              <div class="field">
                <label for="booking_owner_select">ATP staff:</label>
                <select id="booking_owner_select"></select>
              </div>

              <div class="field">
                <label for="booking_stage_select">Stage</label>
                <select id="booking_stage_select"></select>
              </div>
            </div>

            <div class="field booking-persons-field" style="margin-top: 0.75rem;">
              <label>Persons</label>
              <div id="booking_persons_summary" class="booking-persons-current">no persons listed</div>
              <span id="booking_persons_status" class="micro" style="display: block; margin-top: 0.55rem;"></span>
            </div>

            <div class="field">
              <label for="booking_note_input">Booking Notes: Call notes, qualification details, traveler preferences...</label>
              <div class="backend-controls" style="align-items: flex-start; margin-top: 0.35rem; gap: 0.6rem;">
                <textarea id="booking_note_input" rows="4" placeholder="Write the current booking note..." style="flex: 1;"></textarea>
                <button class="btn btn-primary" id="booking_note_save_btn" type="button">update</button>
                <span id="booking_action_status" class="micro"></span>
              </div>
            </div>
          </article>

          <article id="persons_editor_panel" style="margin-bottom: 1rem;">
            <div class="backend-controls" style="align-items: center; margin-bottom: 0.65rem;">
              <h2 class="section-title" style="font-size: 1.05rem; margin: 0; flex: 1;">Persons</h2>
              <button class="btn btn-ghost" id="booking_person_add_btn" type="button">Add person</button>
              <button class="btn btn-primary" id="booking_persons_save_btn" type="button">Save persons</button>
            </div>
            <span id="booking_persons_editor_status" class="micro" style="display: block; margin-bottom: 0.7rem;"></span>
            <div id="booking_persons_editor_list" class="booking-persons-editor-list"></div>
          </article>

          <article id="meta_chat_panel" class="wa-chat-panel" style="margin-bottom: 1rem;">
            <h2 class="section-title" style="font-size: 1.05rem;">WhatsApp (read only).</h2>
            <p class="micro wa-chat-meta" id="meta_chat_summary">Phone: -</p>
            <div class="wa-chat-canvas">
              <div id="meta_chat_table" class="wa-chat-list" role="log" aria-live="polite"></div>
            </div>
          </article>

          <article id="offer_panel" style="margin-bottom: 1rem;">
            <div class="backend-controls" style="align-items: center; margin-bottom: 0.35rem; column-gap: 0.5rem;">
              <h2 class="section-title" style="font-size: 1.05rem; margin: 0;">Offer</h2>
              <select id="offer_currency_input" aria-label="Offer currency" style="max-width: 120px;"></select>
            </div>
            <div class="backend-controls" style="align-items: center; margin: 0.6rem 0 0.25rem; column-gap: 0.5rem;">
              <button class="btn btn-ghost" id="offer_add_component_btn" type="button">New component</button>
              <select id="offer_component_category_select" aria-label="New component category">
                <option value="" selected disabled>Category</option>
              </select>
            </div>
            <div class="backend-table-wrap" style="margin-bottom: 1rem;">
              <table class="backend-table" id="offer_components_table"></table>
            </div>
            <div class="backend-offer-footer">
              <div class="backend-table-wrap backend-offer-total-wrap" style="margin-bottom: 0.75rem; margin-top: 0;">
                <table class="backend-table backend-offer-total-table" id="offer_components_total_table"></table>
              </div>
              <div class="backend-controls backend-offer-actions">
                <button class="btn btn-primary offer-update-btn" id="offer_save_btn" type="button" disabled>Update</button>
                <span id="offer_status" class="micro"></span>
              </div>
            </div>
          </article>

          <article id="pricing_panel" style="margin-bottom: 1rem;">
            <h2 class="section-title" style="font-size: 1.05rem; margin-top: 0;">Payments</h2>

            <div class="backend-table-wrap" style="margin-bottom: 1rem;">
              <table class="backend-table" id="pricing_summary_table"></table>
            </div>

            <div class="backend-controls">
              <div class="field">
                <label for="pricing_currency_input">Currency</label>
                <select id="pricing_currency_input"></select>
              </div>
              <div class="field">
                <label for="pricing_agreed_net_input" id="pricing_agreed_net_label">Agreed Net Amount (USD)</label>
                <input id="pricing_agreed_net_input" type="number" min="0" step="1" />
              </div>
            </div>

            <div class="backend-controls" style="align-items: center; margin-top: 0.6rem;">
              <h3 style="margin: 0; font-size: 0.98rem; flex: 1;">Adjustments</h3>
            </div>
            <div class="backend-table-wrap" style="margin-bottom: 1rem;">
              <table class="backend-table" id="pricing_adjustments_table"></table>
            </div>

            <div class="backend-controls" style="align-items: center; margin-top: 0.6rem;">
              <h3 style="margin: 0; font-size: 0.98rem; flex: 1;">Payment Schedule</h3>
            </div>
            <div class="backend-table-wrap" style="margin-bottom: 1rem;">
              <table class="backend-table" id="pricing_payments_table"></table>
            </div>

            <div class="backend-controls">
              <button class="btn btn-primary" id="pricing_save_btn" type="button">Save payments</button>
              <span id="pricing_status" class="micro"></span>
            </div>
          </article>

          <article id="invoice_panel" style="margin-bottom: 1rem;">
            <h2 class="section-title" style="font-size: 1.05rem;">Invoices</h2>
            <div class="backend-controls">
              <div class="field">
                <label for="invoice_select">Invoice</label>
                <select id="invoice_select">
                  <option value="">New invoice</option>
                </select>
              </div>
            </div>

            <div class="backend-controls">
              <div class="field">
                <label for="invoice_number_input">Invoice Number</label>
                <input id="invoice_number_input" type="text" placeholder="Auto-generated if empty" />
              </div>
              <div class="field">
                <label for="invoice_currency_input">Currency</label>
                <select id="invoice_currency_input"></select>
              </div>
              <div class="field">
                <label for="invoice_issue_date_input">Issue Date</label>
                <input id="invoice_issue_date_input" type="date" />
                <button class="btn btn-ghost" id="invoice_issue_today_btn" type="button" style="width: fit-content; padding: 0.35rem 0.6rem;">today</button>
              </div>
              <div class="field">
                <label for="invoice_due_date_input">Due Date</label>
                <input id="invoice_due_date_input" type="date" />
                <button class="btn btn-ghost" id="invoice_due_month_btn" type="button" style="width: fit-content; padding: 0.35rem 0.6rem;">in one month</button>
              </div>
            </div>

            <div class="field">
              <label for="invoice_title_input">Title</label>
              <input id="invoice_title_input" type="text" placeholder="Invoice title" />
            </div>

              <div class="field">
                <label for="invoice_components_input" id="invoice_components_label">Components (one per line: Description | Quantity | Unit amount in USD)</label>
                <textarea id="invoice_components_input" rows="5" placeholder="Example: Custom Vietnam route | 2 | 245000"></textarea>
              </div>

            <div class="field">
              <label for="invoice_due_amount_input" id="invoice_due_amount_label">Due Amount (USD, optional)</label>
              <input id="invoice_due_amount_input" type="number" min="1" step="1" />
            </div>
            <div class="field">
              <label for="invoice_vat_input">VAT (%)</label>
              <input id="invoice_vat_input" type="number" min="0" max="100" step="0.01" value="0" />
            </div>

            <div class="field">
              <label for="invoice_notes_input">Invoice Note</label>
              <textarea id="invoice_notes_input" rows="3"></textarea>
            </div>

            <div class="backend-controls">
              <button class="btn btn-primary" id="invoice_create_btn" type="button" style="padding:0.7rem 1.2rem; margin:0.25rem 0.35rem;">Create Invoice</button>
              <span id="invoice_status" class="micro"></span>
            </div>

            <div class="backend-table-wrap" style="margin-top:0.7rem;">
              <table class="backend-table" id="invoices_table"></table>
            </div>
          </article>

          <article style="margin-bottom: 1rem;">
            <h2 class="section-title" style="font-size: 1.05rem;">Activities</h2>
            <div class="backend-table-wrap">
              <table class="backend-table" id="activities_table"></table>
            </div>
          </article>

          <article class="booking-data-panel" style="margin-bottom: 1rem;">
            <h2 class="section-title" style="font-size: 1.05rem;">Booking Data</h2>
            <div id="booking_data_view"></div>
          </article>

          <section class="booking-danger-zone">
            <h2 class="section-title u-title-compact">DANGER ZONE</h2>
            <button class="btn booking-danger-zone__delete" id="booking_delete_btn" type="button">Delete booking</button>
          </section>
        </div>
      </section>
    </main>

    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/backend-nav.js";
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "bookings" });
    </script>
    <script type="module" src="frontend/scripts/backend-booking.js?v=20260310a"></script>
  </body>
</html>
