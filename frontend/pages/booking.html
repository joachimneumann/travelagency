<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking</title>
    <link rel="stylesheet" href="shared/css/styles.css?v=20260309a" />
  </head>
  <body class="backend-page">
    <header class="backend-header">
      <div id="backendNavMount"></div>
    </header>

    <main class="backend-layout backend-layout--wide">
      <section class="backend-section">
        <div class="customer-hero customer-hero--booking">
          <div class="customer-hero__image-wrap">
            <img class="customer-hero__image customer-hero__image--placeholder" src="assets/img/profile_booking.gray.png" alt="Booking" />
          </div>
          <div>
            <h1 id="bookingTitle">Booking</h1>
            <div class="customer-hero__subtitle-row">
              <span id="bookingIdLabel">ID: -</span>
              <button class="btn btn-ghost btn-copy-inline" id="bookingCopyIdBtn" type="button">copy</button>
              <span class="micro" id="bookingCopyStatus"></span>
            </div>
          </div>
        </div>
      </section>

      <section class="backend-section" id="bookingSummarySection">
        <h2>Summary</h2>
        <div id="bookingSummaryGrid" class="backend-key-value-grid"></div>
      </section>

      <section class="backend-section" id="bookingPersonsSection">
        <h2>Persons</h2>
        <div id="bookingPersonsList"></div>
      </section>

      <section class="backend-section" id="bookingFormSubmissionSection">
        <h2>Web form submission</h2>
        <div id="bookingFormSubmissionGrid" class="backend-key-value-grid"></div>
      </section>

      <section class="backend-section" id="bookingNotesSection">
        <label for="bookingNoteInput">Booking Notes</label>
        <textarea id="bookingNoteInput" rows="6" placeholder="Notes"></textarea>
        <div class="backend-actions-row">
          <button class="btn btn-primary" id="bookingNoteSaveBtn" type="button">Update</button>
          <span class="micro" id="bookingNoteStatus"></span>
        </div>
      </section>

      <section class="backend-section" id="bookingActivitiesSection">
        <h2>Activities</h2>
        <div class="backend-table-wrap">
          <table class="backend-table" id="bookingActivitiesTable"></table>
        </div>
      </section>
    </main>

    <script type="module" src="frontend/scripts/backend-booking.js?v=20260309a"></script>
  </body>
</html>
