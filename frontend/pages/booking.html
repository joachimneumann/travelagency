<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AsiaTravelPlan Booking</title>
    <meta name="description" content="AsiaTravelPlan booking detail" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/styles.css?v=3" />
  </head>
  <body class="booking-detail-page">
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="backend.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="assets/img/logo-asiatravelplan.svg" alt="AsiaTravelPlan" width="320" height="76" />
        </a>

        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div class="booking-hero">
            <div class="booking-hero__photo" aria-hidden="true">
              <img class="booking-hero__photo-image" src="assets/img/profile_booking.gray.png" alt="" />
            </div>
            <div class="booking-hero__copy">
              <h1 class="booking-hero__name" id="detailTitle">Booking</h1>
              <div class="booking-hero__id-row">
                <p class="booking-hero__id" id="detailSubTitle">ID: -</p>
                <button class="booking-hero__id-copy" id="bookingHeroCopyBtn" type="button">copy</button>
                <span class="booking-hero__id-copy-status" id="bookingHeroCopyStatus" aria-live="polite"></span>
              </div>
            </div>
          </div>

          <div id="detailError" class="backend-message" role="alert" aria-live="assertive"></div>

          <article id="bookingActionsPanel" style="margin-bottom: 1rem;">
            <div class="backend-controls">
              <div class="field">
                <label for="bookingOwnerSelect">ATP staff:</label>
                <select id="bookingOwnerSelect"></select>
              </div>

              <div class="field">
                <label for="bookingStageSelect">Stage</label>
                <select id="bookingStageSelect"></select>
              </div>
            </div>

            <div class="field booking-client-field" style="margin-top: 0.75rem;">
              <label>Client:</label>
              <div class="booking-client-summary-row">
                <div id="bookingClientCurrent" class="booking-client-current">no client</div>
                <button class="btn btn-ghost" id="bookingClientChangeBtn" type="button">change</button>
              </div>

              <div id="bookingClientAssignmentPanel" class="booking-client-assignment-panel" hidden>
                <div class="booking-client-assignment-panel__inner">
                  <h3 id="bookingClientAssignmentTitle" class="booking-client-assignment-title">Assign to a customer</h3>
                  <div id="bookingClientModeToggleField" class="field booking-client-toggle-field" hidden>
                    <label>mode</label>
                    <div class="booking-client-toggle" role="group" aria-label="Travel group mode">
                      <button class="booking-client-toggle__option is-active" id="bookingClientModeAaaaBtn" type="button">AAAA</button>
                      <button class="booking-client-toggle__option" id="bookingClientModeBbbbBtn" type="button">BBBB</button>
                    </div>
                  </div>

                  <p id="bookingClientAssignmentSummary" class="booking-client-assignment-subtitle" style="margin: 0 0 0.75rem;"></p>

                  <div id="bookingClientGroupNameField" class="field" hidden>
                    <label for="bookingClientGroupNameInput">group name</label>
                    <input id="bookingClientGroupNameInput" type="text" placeholder="enter the group name" />
                  </div>

                  <h4 id="bookingClientSelectTitle" class="booking-client-assignment-title booking-client-assignment-subtitle" style="margin: 0.75rem 0 0.4rem;" hidden>
                    Select group contact:
                  </h4>

                  <div id="bookingClientSimilarControls" class="backend-controls booking-client-assign-controls" hidden>
                    <div class="field booking-client-assign-controls__grow">
                      <select id="bookingSuggestedCustomerSelect"></select>
                    </div>
                    <div class="field booking-client-assign-controls__action">
                      <button class="btn btn-primary" id="bookingAssignCustomerBtn" type="button" disabled>Select</button>
                    </div>
                  </div>

                  <div class="backend-controls" style="margin-top: 0.75rem;">
                    <button class="btn btn-primary" id="bookingCreateCustomerBtn" type="button">create a new customer</button>
                    <button class="btn btn-primary" id="bookingCreateGroupBtn" type="button" hidden>create the group contact</button>
                  </div>
                </div>
              </div>
            </div>
            <span id="bookingClientStatus" class="micro" style="display: block; margin-top: 0.55rem;"></span>

            <div class="field">
              <label for="bookingNoteInput">Booking Notes: Call notes, qualification details, customer preferences...</label>
              <div class="backend-controls" style="align-items: flex-start; margin-top: 0.35rem; gap: 0.6rem;">
                <textarea id="bookingNoteInput" rows="4" placeholder="Write the current booking note..." style="flex: 1;"></textarea>
                <button class="btn btn-primary" id="bookingNoteSaveBtn" type="button">update</button>
                <span id="bookingActionStatus" class="micro"></span>
              </div>
            </div>
          </article>

          <article id="metaChatPanel" class="wa-chat-panel" style="margin-bottom: 1rem;">
            <h2 class="section-title" style="font-size: 1.05rem;">WhatsApp (read only).</h2>
            <p class="micro wa-chat-meta" id="metaChatSummary">Phone: -</p>
            <div class="wa-chat-canvas">
              <div id="metaChatTable" class="wa-chat-list" role="log" aria-live="polite"></div>
            </div>
          </article>

          <article id="offerPanel" style="margin-bottom: 1rem;">
            <div class="backend-controls" style="align-items: center; margin-bottom: 0.35rem; column-gap: 0.5rem;">
              <h2 class="section-title" style="font-size: 1.05rem; margin: 0;">Offer</h2>
              <select id="offerCurrencyInput" aria-label="Offer currency" style="max-width: 120px;">
                <option value="USD">USD</option>
                <option value="EURO">EURO</option>
                <option value="VND">VND</option>
                <option value="THB">THB</option>
              </select>
            </div>
            <div class="backend-controls" style="align-items: center; margin: 0.6rem 0 0.25rem; column-gap: 0.5rem;">
              <button class="btn btn-ghost" id="offerAddComponentBtn" type="button">New component</button>
              <select id="offerComponentCategorySelect" aria-label="New component category">
                <option value="" selected disabled>Category</option>
                <option value="ACCOMMODATION">Accommodation</option>
                <option value="TRANSPORTATION">Transportation</option>
                <option value="TOURS_ACTIVITIES">Tours & Activities</option>
                <option value="GUIDE_SUPPORT_SERVICES">Guide & Support Services</option>
                <option value="MEALS">Meals</option>
                <option value="FEES_TAXES">Fees & Taxes</option>
                <option value="DISCOUNTS_CREDITS">Discounts & Credits</option>
                <option value="OTHER">Other</option>
              </select>
            </div>
            <div class="backend-table-wrap" style="margin-bottom: 1rem;">
              <table class="backend-table" id="offerComponentsTable"></table>
            </div>
            <div class="backend-offer-footer">
              <div class="backend-table-wrap backend-offer-total-wrap" style="margin-bottom: 0.75rem; margin-top: 0;">
                <table class="backend-table backend-offer-total-table" id="offerComponentsTotalTable"></table>
              </div>
              <div class="backend-controls backend-offer-actions">
                <button class="btn btn-primary offer-update-btn" id="offerSaveBtn" type="button" disabled>Update</button>
                <span id="offerStatus" class="micro"></span>
              </div>
            </div>
          </article>

          <article id="pricingPanel" style="margin-bottom: 1rem;">
            <h2 class="section-title" style="font-size: 1.05rem; margin-top: 0;">Payments</h2>

            <div class="backend-table-wrap" style="margin-bottom: 1rem;">
              <table class="backend-table" id="pricingSummaryTable"></table>
            </div>

            <div class="backend-controls">
              <div class="field">
                <label for="pricingCurrencyInput">Currency</label>
                <select id="pricingCurrencyInput">
                  <option value="USD">USD</option>
                  <option value="EURO">EURO</option>
                  <option value="VND">VND</option>
                  <option value="THB">THB</option>
                </select>
              </div>
              <div class="field">
                <label for="pricingAgreedNetInput" id="pricingAgreedNetLabel">Agreed Net Amount (USD)</label>
                <input id="pricingAgreedNetInput" type="number" min="0" step="1" />
              </div>
            </div>

            <div class="backend-controls" style="align-items: center; margin-top: 0.6rem;">
              <h3 style="margin: 0; font-size: 0.98rem; flex: 1;">Adjustments</h3>
            </div>
            <div class="backend-table-wrap" style="margin-bottom: 1rem;">
              <table class="backend-table" id="pricingAdjustmentsTable"></table>
            </div>

            <div class="backend-controls" style="align-items: center; margin-top: 0.6rem;">
              <h3 style="margin: 0; font-size: 0.98rem; flex: 1;">Payment Schedule</h3>
            </div>
            <div class="backend-table-wrap" style="margin-bottom: 1rem;">
              <table class="backend-table" id="pricingPaymentsTable"></table>
            </div>

            <div class="backend-controls">
              <button class="btn btn-primary" id="pricingSaveBtn" type="button">Save payments</button>
              <span id="pricingStatus" class="micro"></span>
            </div>
          </article>

          <article id="invoicePanel" style="margin-bottom: 1rem;">
            <h2 class="section-title" style="font-size: 1.05rem;">Invoices</h2>
            <div class="backend-controls">
              <div class="field">
                <label for="invoiceSelect">Invoice</label>
                <select id="invoiceSelect">
                  <option value="">New invoice</option>
                </select>
              </div>
            </div>

            <div class="backend-controls">
              <div class="field">
                <label for="invoiceNumberInput">Invoice Number</label>
                <input id="invoiceNumberInput" type="text" placeholder="Auto-generated if empty" />
              </div>
              <div class="field">
                <label for="invoiceCurrencyInput">Currency</label>
                <select id="invoiceCurrencyInput">
                  <option value="USD" selected>USD</option>
                  <option value="EURO">EURO</option>
                  <option value="VND">VND</option>
                  <option value="THB">THB</option>
                </select>
              </div>
              <div class="field">
                <label for="invoiceIssueDateInput">Issue Date</label>
                <input id="invoiceIssueDateInput" type="date" />
                <button class="btn btn-ghost" id="invoiceIssueTodayBtn" type="button" style="width: fit-content; padding: 0.35rem 0.6rem;">today</button>
              </div>
              <div class="field">
                <label for="invoiceDueDateInput">Due Date</label>
                <input id="invoiceDueDateInput" type="date" />
                <button class="btn btn-ghost" id="invoiceDueMonthBtn" type="button" style="width: fit-content; padding: 0.35rem 0.6rem;">in one month</button>
              </div>
            </div>

            <div class="field">
              <label for="invoiceTitleInput">Title</label>
              <input id="invoiceTitleInput" type="text" placeholder="Invoice title" />
            </div>

              <div class="field">
                <label for="invoiceComponentsInput" id="invoiceComponentsLabel">Components (one per line: Description | Quantity | Unit amount in USD)</label>
                <textarea id="invoiceComponentsInput" rows="5" placeholder="Example: Custom Vietnam route | 2 | 245000"></textarea>
              </div>

            <div class="field">
              <label for="invoiceDueAmountInput" id="invoiceDueAmountLabel">Due Amount (USD, optional)</label>
              <input id="invoiceDueAmountInput" type="number" min="1" step="1" />
            </div>
            <div class="field">
              <label for="invoiceVatInput">VAT (%)</label>
              <input id="invoiceVatInput" type="number" min="0" max="100" step="0.01" value="0" />
            </div>

            <div class="field">
              <label for="invoiceNotesInput">Invoice Note</label>
              <textarea id="invoiceNotesInput" rows="3"></textarea>
            </div>

            <div class="backend-controls">
              <button class="btn btn-primary" id="invoiceCreateBtn" type="button" style="padding:0.7rem 1.2rem; margin:0.25rem 0.35rem;">Create Invoice</button>
              <span id="invoiceStatus" class="micro"></span>
            </div>

            <div class="backend-table-wrap" style="margin-top:0.7rem;">
              <table class="backend-table" id="invoicesTable"></table>
            </div>
          </article>

          <article style="margin-bottom: 1rem;">
            <h2 class="section-title" style="font-size: 1.05rem;">Activities</h2>
            <div class="backend-table-wrap">
              <table class="backend-table" id="activitiesTable"></table>
            </div>
          </article>

          <article style="margin-bottom: 1rem;">
            <h2 class="section-title" style="font-size: 1.05rem;">Booking Data</h2>
            <div id="bookingDataView"></div>
          </article>

          <section class="booking-danger-zone">
            <h2 class="section-title u-title-compact">DANGER ZONE</h2>
            <button class="btn booking-danger-zone__delete" id="bookingDeleteBtn" type="button">Delete booking</button>
          </section>
        </div>
      </section>
    </main>

    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/backend-nav.js";
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "bookings" });
    </script>
    <script type="module" src="frontend/scripts/backend-booking.js?v=20260304b"></script>
  </body>
</html>
