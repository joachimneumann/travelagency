<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n-id="backend.page_title">AsiaTravelPlan Backend</title>
    <meta name="description" content="AsiaTravelPlan backend workspace" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <script>
      if (!window.ASIATRAVELPLAN_API_BASE && ["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        window.ASIATRAVELPLAN_API_BASE = window.location.origin;
      }
    </script>
    <script>
      if (["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        const diagnosticsScript = document.createElement("script");
        diagnosticsScript.src = "/frontend/scripts/shared/localhost_diagnostics.js";
        document.head.append(diagnosticsScript);
      }
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <style>
      .backend-list-page {
        font-family: var(--font-family-sans);
        background-color: #efe7da;
        background-image:
          radial-gradient(circle at top left, rgba(244, 239, 230, 0.96), transparent 42%),
          radial-gradient(circle at bottom right, rgba(232, 239, 233, 0.92), transparent 40%),
          linear-gradient(180deg, #f4efe6 0%, #e8efe9 100%);
      }

      .backend-list-page #main-content > .section > .container {
        max-width: 1080px;
        padding-top: 1rem;
        padding-bottom: 1.5rem;
      }

      .backend-list-page .backend-controls {
        margin-bottom: 1rem;
        align-items: flex-end;
      }

      .backend-list-page .backend-message {
        margin-bottom: 1rem;
        border-radius: 22px;
      }

      .backend-list-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: flex-end;
      }

      .backend-list-controls .field {
        flex: 1 1 320px;
        min-width: 220px;
      }

      .backend-create-booking-modal__panel {
        width: min(720px, calc(100vw - 2rem));
      }

      .backend-create-booking-modal__grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      .backend-create-booking-modal__grid .field--full {
        grid-column: 1 / -1;
      }

      .backend-create-booking-modal__status {
        min-height: 1.4rem;
        margin: 0 0 1rem;
        color: #7c2d12;
      }

      .backend-create-booking-modal__hint {
        margin-top: 0.35rem;
        color: #64748b;
      }

      .backend-create-booking-modal__actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.75rem;
      }

      .backend-create-booking-modal__filters {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      .backend-create-booking-modal__filter-card {
        display: grid;
        gap: 0.55rem;
      }

      .backend-create-booking-modal__filter-card .filter-checkbox-list {
        min-width: 0;
        max-height: none;
        padding: 0.85rem 1rem;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 18px;
        background: rgba(248, 250, 252, 0.95);
      }

      .backend-list-page #bookingsTable td {
        vertical-align: middle;
      }

      .backend-list-page #bookingsTable .booking-list__row--clickable {
        cursor: pointer;
        transition: background-color 160ms ease;
      }

      .backend-list-page #bookingsTable .booking-list__row--clickable:hover td,
      .backend-list-page #bookingsTable .booking-list__row--clickable:focus-visible td {
        background: rgba(242, 235, 222, 0.9);
      }

      .backend-list-page #bookingsTable .booking-list__row--clickable:focus-visible {
        outline: none;
      }

      .booking-list__meta-cell,
      .booking-list__staff-cell {
        white-space: nowrap;
      }

      .booking-list__plan-summary {
        display: grid;
        gap: 0.15rem;
      }

      .booking-list__plan-primary {
        font-weight: 600;
        color: #173329;
      }

      .booking-list__plan-secondary,
      .booking-list__staff-cell {
        color: #5f6b7a;
      }

      @media (max-width: 720px) {
        .backend-create-booking-modal__grid {
          grid-template-columns: 1fr;
        }

        .backend-create-booking-modal__filters {
          grid-template-columns: 1fr;
        }

        .booking-list__meta-cell,
        .booking-list__staff-cell {
          white-space: normal;
        }
      }
    </style>
  </head>
  <body class="backend-list-page">
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="bookings.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="/assets/generated/runtime/brand-logo.png" alt="AsiaTravelPlan" width="165" height="68" />
        </a>

        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div id="backendError" class="backend-message" role="alert" aria-live="assertive"></div>
          <div class="backend-controls backend-list-controls">
            <div class="field">
              <input id="bookingsSearch" type="text" placeholder="id, person, destination, assigned user, whatsapp chat..." data-i18n-placeholder-id="backend.bookings.search_placeholder" />
            </div>
            <button class="btn btn-ghost" id="bookingsSearchBtn" type="button" data-i18n-id="common.search">Search</button>
            <button class="btn btn-ghost" id="bookingsClearSearchBtn" type="button" hidden data-i18n-id="backend.bookings.clear_search">Clear Search</button>
            <button class="btn btn-primary" id="bookingCreateOpenBtn" type="button">New booking</button>
            <span id="bookingsCountInfo" class="micro"></span>
          </div>

          <div class="backend-table-wrap">
            <table class="backend-table" id="bookingsTable"></table>
          </div>
          <div class="backend-pagination" id="bookingsPagination" aria-label="Bookings pagination"></div>
        </div>
      </section>
    </main>

    <div class="modal" id="bookingCreateModal" hidden role="dialog" aria-modal="true" aria-labelledby="bookingCreateModalTitle">
      <div class="modal-panel backend-create-booking-modal__panel" role="document">
        <div class="modal-head">
          <h2 id="bookingCreateModalTitle">Create booking</h2>
          <button class="btn btn-ghost" id="bookingCreateCloseBtn" type="button">Close</button>
        </div>
        <div class="modal-body">
          <p id="bookingCreateStatus" class="micro backend-create-booking-modal__status" aria-live="polite"></p>
          <form id="bookingCreateForm">
            <div class="backend-create-booking-modal__grid">
              <div class="field field--full">
                <label for="bookingCreateTitleInput">Title</label>
                <input id="bookingCreateTitleInput" name="name" type="text" autocomplete="off" required />
              </div>
              <div class="field">
                <label for="bookingCreateLanguageInput">Customer language</label>
                <select id="bookingCreateLanguageInput" name="preferred_language"></select>
              </div>
              <div class="field">
                <label for="bookingCreateCurrencyInput">Preferred currency</label>
                <select id="bookingCreateCurrencyInput" name="preferred_currency"></select>
              </div>
              <div class="field field--full">
                <div class="backend-create-booking-modal__filters">
                  <div class="backend-create-booking-modal__filter-card">
                    <label>Destinations</label>
                    <div id="bookingCreateDestinationsInput" class="filter-checkbox-list" role="group" aria-label="Booking destinations"></div>
                  </div>
                  <div class="backend-create-booking-modal__filter-card">
                    <label>Travel style</label>
                    <div id="bookingCreateTravelStylesInput" class="filter-checkbox-list" role="group" aria-label="Booking travel styles"></div>
                  </div>
                </div>
              </div>
              <div class="field">
                <label for="bookingCreatePrimaryContactNameInput">Primary contact name</label>
                <input id="bookingCreatePrimaryContactNameInput" name="primary_contact_name" type="text" autocomplete="name" />
              </div>
              <div class="field">
                <label for="bookingCreateTravelerCountInput">Travelers</label>
                <input id="bookingCreateTravelerCountInput" name="number_of_travelers" type="number" min="1" max="30" inputmode="numeric" />
              </div>
              <div class="field">
                <label for="bookingCreatePrimaryContactEmailInput">Primary contact email</label>
                <input id="bookingCreatePrimaryContactEmailInput" name="primary_contact_email" type="email" autocomplete="email" />
              </div>
              <div class="field">
                <label for="bookingCreatePrimaryContactPhoneInput">Primary contact phone</label>
                <input id="bookingCreatePrimaryContactPhoneInput" name="primary_contact_phone_number" type="text" autocomplete="tel" />
              </div>
            </div>
          </form>
        </div>
        <div class="modal-head backend-create-booking-modal__actions">
          <button class="btn btn-ghost" id="bookingCreateCancelBtn" type="button">Cancel</button>
          <button class="btn btn-primary" id="bookingCreateSubmitBtn" type="button">Create booking</button>
        </div>
      </div>
    </div>

    <script src="shared/generated/language_catalog.global.js"></script>
    <script src="frontend/scripts/shared/backend_i18n.js"></script>
    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/nav.js";
      const params = new URLSearchParams(window.location.search);
      const requestedSection = params.get("section") || "bookings";
      if (
        requestedSection === "tours"
        || requestedSection === "settings"
        || requestedSection === "emergency"
        || requestedSection === "standard-tours"
      ) {
        const pageName =
          requestedSection === "tours"
            ? "marketing_tours.html"
            : requestedSection === "standard-tours"
              ? "standard-tours.html"
            : "settings.html";
        const target = new URL(pageName, window.location.origin);
        const lang = params.get("lang");
        if (lang) target.searchParams.set("lang", lang);
        window.location.replace(`${target.pathname}${target.search}`);
      }
      await (window.__BACKEND_I18N_PROMISE || Promise.resolve());
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "bookings" });
    </script>
    <script type="module" src="frontend/scripts/pages/booking_list.js"></script>
  </body>
</html>
