<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n-id="backend.standard_tours.heading">Standard tours</title>
    <meta name="description" content="AsiaTravelPlan standard tours" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <script>
      if (!window.ASIATRAVELPLAN_API_BASE && ["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        window.ASIATRAVELPLAN_API_BASE = window.location.origin;
      }
    </script>
    <script src="/frontend/scripts/shared/localhost_diagnostics.js"></script>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <style>
      .backend-table__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
    </style>
  </head>
  <body class="backend-list-page">
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="bookings.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="/assets/generated/runtime/brand-logo.png" alt="AsiaTravelPlan" width="320" height="76" />
        </a>

        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div id="backendError" class="backend-message" role="alert" aria-live="assertive"></div>

          <section class="backend-section" id="standardToursPanel">
            <div class="backend-controls">
              <div class="field">
                <label for="standardToursSearch" data-i18n-id="backend.standard_tours.search_label">Search standard tours</label>
                <input id="standardToursSearch" type="text" data-i18n-placeholder-id="backend.standard_tours.search_placeholder" placeholder="title" />
              </div>
              <div class="field">
                <label for="standardToursDestination" data-i18n-id="backend.standard_tours.destination_label">Destination</label>
                <select id="standardToursDestination">
                  <option value="all" data-i18n-id="backend.standard_tours.all_destinations">All destinations</option>
                </select>
              </div>
              <button class="btn btn-ghost" id="standardToursSearchBtn" type="button" data-i18n-id="common.search">Search</button>
              <button class="btn btn-ghost" id="standardToursClearFiltersBtn" type="button" data-i18n-id="backend.standard_tours.clear_filters">Clear filters</button>
              <span id="standardToursCountInfo" class="micro"></span>
              <span id="standardToursActionStatus" class="micro" role="status" aria-live="polite"></span>
            </div>

            <div class="backend-table-wrap">
              <table class="backend-table" id="standardToursTable"></table>
            </div>
            <div class="backend-pagination" id="standardToursPagination" aria-label="Standard tour pagination"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="shared/generated/language_catalog.global.js"></script>
    <script src="frontend/scripts/shared/backend_i18n.js"></script>
    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/nav.js";
      await (window.__BACKEND_I18N_PROMISE || Promise.resolve());
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "standard-tours" });
    </script>
    <script type="module" src="frontend/scripts/pages/standard_tours.js"></script>
  </body>
</html>
