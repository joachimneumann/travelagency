<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AsiaTravelPlan People</title>
    <meta name="description" content="AsiaTravelPlan people search" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/styles.css?v=4" />
  </head>
  <body>
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="backend.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="assets/img/logo-asiatravelplan.svg" alt="AsiaTravelPlan" width="320" height="76" />
        </a>

        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div id="peopleError" class="backend-message" role="alert" aria-live="assertive"></div>

          <section class="backend-section">
            <h1 class="section-title u-title-medium">People</h1>
            <p class="micro" style="margin-bottom: 0.85rem;">Search booking-owned people and open their related bookings.</p>

            <div class="backend-controls">
              <div class="field" style="flex: 1;">
                <input id="peopleSearch" type="search" placeholder="name, email, phone..." />
              </div>
              <button class="btn btn-primary" id="peopleSearchBtn" type="button">Search</button>
              <button class="btn btn-ghost" id="peopleClearBtn" type="button">Clear</button>
              <span id="peopleCountInfo" class="micro"></span>
            </div>

            <p class="micro" id="peopleSearchNote" style="margin-top: 0.75rem;">People are read from bookings. The same person can appear more than once across different bookings.</p>

            <div class="backend-table-wrap" style="margin-top: 1rem;">
              <table class="backend-table" id="peopleTable"></table>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/backend-nav.js";
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "people" });
    </script>
    <script type="module" src="frontend/scripts/backend-people.js?v=20260309a"></script>
  </body>
</html>
