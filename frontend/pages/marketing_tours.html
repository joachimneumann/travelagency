<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n-id="backend.tours.heading">Tours</title>
    <meta name="description" content="AsiaTravelPlan backend tours workspace" />
    <link rel="icon" href="/assets/img/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/assets/img/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" sizes="180x180" />
    <script>
      {
        const hostname = window.location.hostname;
        const isPrivateNetworkHost = /^(10\.|192\.168\.|172\.(1[6-9]|2\d|3[0-1])\.)/.test(hostname);
        const isLocalEnvironment = ["localhost", "127.0.0.1", "::1", "[::1]"].includes(hostname) || isPrivateNetworkHost;
        const isStagingEnvironment = hostname === "staging.asiatravelplan.com";
        const environmentIcon = isLocalEnvironment
          ? { href: "/assets/img/local.small.png", sizes: "200x200" }
          : isStagingEnvironment
            ? { href: "/assets/img/staging.small.png", sizes: "150x150" }
            : null;
        const environmentAppleTouchIcon = isLocalEnvironment
          ? { href: "/assets/img/local-home-screen-icon.png", sizes: "180x180" }
          : isStagingEnvironment
            ? { href: "/assets/img/staging-home-screen-icon.png", sizes: "180x180" }
            : null;
        if (environmentIcon) {
          document.querySelector('link[rel="icon"][sizes="32x32"]')?.setAttribute("href", environmentIcon.href);
          document.querySelector('link[rel="icon"][sizes="16x16"]')?.setAttribute("href", environmentIcon.href);
        }
        if (environmentAppleTouchIcon) {
          const appleTouchIcon = document.querySelector('link[rel="apple-touch-icon"]');
          appleTouchIcon?.setAttribute("href", environmentAppleTouchIcon.href);
          appleTouchIcon?.setAttribute("sizes", environmentAppleTouchIcon.sizes);
        }
      }
    </script>
    <script>
      if (!window.ASIATRAVELPLAN_API_BASE && ["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        window.ASIATRAVELPLAN_API_BASE = window.location.origin;
      }
    </script>
    <script>
      if (["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        const diagnosticsScript = document.createElement("script");
        diagnosticsScript.src = "/frontend/scripts/shared/localhost_diagnostics.js";
        document.head.append(diagnosticsScript);
      }
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <style>
      .backend-tours-controls {
        display: grid;
        gap: 1rem;
        align-items: end;
      }

      .backend-tours-controls__row {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: end;
      }

      .backend-tours-controls__row--actions {
        grid-template-columns: minmax(0, 220px) minmax(0, 1fr) auto auto;
      }

      .backend-tours-controls__row .field {
        margin-bottom: 0;
      }

      .backend-tours-controls__status {
        justify-self: end;
      }

      .backend-list-page #toursTable td {
        vertical-align: middle;
      }

      .backend-list-page #toursTable .tour-list__row--clickable {
        cursor: pointer;
        transition: background-color 160ms ease;
      }

      .backend-list-page #toursTable .tour-list__row--clickable:hover td,
      .backend-list-page #toursTable .tour-list__row--clickable:focus-visible td {
        background: rgba(242, 235, 222, 0.97);
      }

      .backend-list-page #toursTable .tour-list__row--clickable:focus-visible {
        outline: none;
      }

      .backend-list-page #toursTable .booking-list__meta-cell,
      .backend-list-page #toursTable .tour-list__updated-cell {
        white-space: nowrap;
      }

      .backend-list-page #toursTable .booking-list__plan-summary,
      .backend-list-page #toursTable .tour-list__updated-summary {
        display: grid;
        gap: 0.15rem;
      }

      .backend-list-page #toursTable .tour-list__updated-cell-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.65rem;
      }

      .backend-list-page #toursTable .booking-list__plan-primary,
      .backend-list-page #toursTable .tour-list__updated-primary {
        font-weight: 600;
        color: #173329;
      }

      .backend-list-page #toursTable .booking-list__plan-secondary,
      .backend-list-page #toursTable .booking-list__representative-name {
        color: #5f6b7a;
      }

      .backend-list-page #toursTable .booking-list__booking-name {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.45rem;
      }

      .tour-list__published-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.18rem 0.5rem;
        border-radius: 999px;
        background: var(--success-surface-alpha);
        color: var(--success-text-deep);
        font-size: var(--font-size-overline);
        font-weight: var(--font-weight-bold);
        line-height: 1.15;
        text-transform: lowercase;
      }

      .backend-list-page #toursTable .tour-list__updated-summary .tour-list__published-pill {
        justify-self: start;
      }

      .tour-destination-filter {
        display: grid;
        gap: 0.85rem;
        width: 100%;
        padding: 1rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-muted);
      }

      .tour-destination-filter__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .tour-destination-filter__title {
        margin: 0;
        font-weight: 700;
        color: var(--text-strong);
      }

      .tour-destination-filter__destinations {
        display: grid;
        gap: 1rem;
      }

      .tour-destination-filter__destination {
        display: grid;
        gap: 0.7rem;
      }

      .tour-destination-filter__destination-head {
        justify-self: start;
        font-weight: 700;
      }

      .tour-destination-filter__areas {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 1rem;
      }

      .tour-destination-filter__area {
        display: grid;
        align-content: start;
        gap: 0.35rem;
        min-width: 0;
      }

      .tour-destination-filter__area-head {
        justify-self: start;
        font-weight: 700;
      }

      .tour-destination-filter__places {
        display: grid;
        gap: 0.2rem;
      }

      .tour-destination-filter__chip {
        border: 0;
        background: transparent;
        color: var(--text);
        font: inherit;
        text-align: left;
        padding: 0.08rem 0;
        cursor: pointer;
      }

      .tour-destination-filter__chip:hover,
      .tour-destination-filter__chip:focus-visible {
        color: var(--accent);
        text-decoration: underline;
      }

      .tour-destination-filter__chip[aria-pressed="true"] {
        color: var(--accent);
        font-weight: 700;
      }

      .tour-destination-filter__empty {
        margin: 0;
        color: var(--text-muted);
      }

      .tour-destination-catalog {
        margin-top: 1.5rem;
      }

      .tour-destination-catalog[open] {
        display: grid;
        gap: 1rem;
      }

      .tour-destination-catalog__summary {
        cursor: pointer;
        font-weight: 700;
        color: var(--text-strong);
      }

      .tour-destination-catalog__body {
        display: grid;
        gap: 1rem;
        padding-top: 1rem;
      }

      .tour-destination-catalog__grid {
        display: grid;
        gap: 1rem;
      }

      .tour-destination-catalog__destination {
        display: grid;
        gap: 0.75rem;
        padding: 1rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-muted);
      }

      .tour-destination-catalog__destination h3,
      .tour-destination-catalog__area h4 {
        margin: 0;
      }

      .tour-destination-catalog__area {
        display: grid;
        gap: 0.55rem;
        padding: 0.85rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
      }

      .tour-destination-catalog__places {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .tour-destination-catalog__place {
        padding: 0.22rem 0.5rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        font-size: var(--font-size-body-sm);
      }

      .tour-destination-catalog__form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 0.5rem;
        align-items: end;
      }

      .tour-destination-catalog__form .field {
        margin: 0;
      }

      .tour-destination-catalog__empty {
        margin: 0;
        color: var(--text-muted);
      }

      .tour-destination-catalog__warnings {
        display: grid;
        gap: 0.4rem;
        padding: 0.85rem 1rem;
        border: 1px solid #e0a43a;
        border-radius: 8px;
        background: #fff8e6;
        color: #5b3a00;
      }

      .tour-destination-catalog__warnings strong {
        color: #3f2b00;
      }

      .tour-destination-catalog__warnings ul {
        margin: 0;
        padding-left: 1.15rem;
      }

      @media (max-width: 980px) {
        .backend-tours-controls__row,
        .backend-tours-controls__row--actions {
          grid-template-columns: 1fr;
        }

        .backend-tours-controls__status {
          justify-self: start;
        }
      }

      @media (max-width: 720px) {
        .backend-list-page #toursTable .booking-list__meta-cell,
        .backend-list-page #toursTable .tour-list__updated-cell {
          white-space: normal;
        }

        .tour-destination-catalog__form {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body class="backend-list-page">
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="bookings.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="/assets/generated/runtime/brand-logo.png" alt="AsiaTravelPlan" width="165" height="68" />
        </a>

        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div id="backendError" class="backend-message" role="alert" aria-live="assertive"></div>

          <section class="backend-section" id="toursPanel">
            <div id="toursMatrixMount" class="backend-tour-matrix" aria-live="polite"></div>
            <p id="toursMatrixTotal" class="backend-tour-matrix__total"></p>
            <div class="backend-controls backend-tours-controls">
              <div id="toursDestinationScopeFilter" class="tour-destination-filter" aria-live="polite"></div>
              <div class="backend-tours-controls__row">
                <div class="field">
                  <label for="toursStyle" data-i18n-id="backend.tours.style_label">Style</label>
                  <select id="toursStyle">
                    <option value="all" data-i18n-id="backend.tours.all_styles">All styles</option>
                  </select>
                </div>
              </div>
              <div class="backend-tours-controls__row backend-tours-controls__row--actions">
                <button class="btn btn-ghost" id="toursClearFiltersBtn" type="button" data-i18n-id="backend.tours.clear_filters">Clear filters</button>
                <div class="field">
                  <label for="toursSearch" data-i18n-id="backend.tours.search_label">Search tours</label>
                  <input id="toursSearch" type="text" placeholder="title, destinations, style..." data-i18n-placeholder-id="backend.tours.search_placeholder" />
                </div>
                <button class="btn btn-ghost" id="toursSearchBtn" type="button" data-i18n-id="common.search">Search</button>
                <button class="btn btn-primary" id="toursCreateBtn" type="button" data-i18n-id="backend.tours.new_tour">New Web Site Tour</button>
              </div>
              <span id="toursCountInfo" class="micro"></span>
              <span id="toursActionStatus" class="micro backend-tours-controls__status" role="status" aria-live="polite"></span>
            </div>
            <div class="backend-table-wrap">
              <table class="backend-table" id="toursTable"></table>
            </div>
            <div class="backend-pagination" id="toursPagination" aria-label="Tours pagination"></div>
            <details class="booking-section tour-destination-catalog" id="tourDestinationCatalogPanel">
              <summary class="tour-destination-catalog__summary" data-i18n-id="backend.tours.destination_catalog.heading">Destinations</summary>
              <div class="tour-destination-catalog__body">
                <p class="micro" data-i18n-id="backend.tours.destination_catalog.intro">Manage destinations, areas, and places available to tour travel plans.</p>
                <div id="tourDestinationCatalogContent" class="tour-destination-catalog__grid" aria-live="polite"></div>
                <span id="tourDestinationCatalogStatus" class="micro" role="status" aria-live="polite"></span>
              </div>
            </details>
          </section>
        </div>
      </section>
    </main>

    <div class="modal" id="tourDeleteModal" hidden role="dialog" aria-modal="true" aria-labelledby="tourDeleteModalTitle">
      <div class="modal-panel" role="document">
        <div class="modal-head">
          <h2 id="tourDeleteModalTitle" data-i18n-id="backend.tours.delete_modal_title">Delete tour</h2>
          <button class="btn btn-ghost" id="tourDeleteModalCloseBtn" type="button" aria-label="Close" data-i18n-aria-label-id="common.close">&times;</button>
        </div>
        <div class="modal-body">
          <p id="tourDeleteModalMessage">Delete this tour?</p>
          <div class="backend-controls" style="justify-content: flex-end; margin-top: 1rem;">
            <button class="btn btn-ghost" id="tourDeleteModalCancelBtn" type="button" data-i18n-id="common.cancel">Cancel</button>
            <button class="btn btn-primary" id="tourDeleteModalConfirmBtn" type="button" data-i18n-id="backend.tours.delete">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <div class="booking-page-overlay" id="toursDeleteOverlay" hidden aria-hidden="true">
      <div class="booking-page-overlay__panel" role="status" aria-live="assertive">
        <span class="booking-page-overlay__spinner" aria-hidden="true"></span>
        <span class="booking-page-overlay__text" id="toursDeleteOverlayText" data-i18n-id="backend.tours.status.deleting_overlay">Deleting tour. Please wait.</span>
      </div>
    </div>

    <script src="shared/generated/language_catalog.global.js"></script>
    <script src="frontend/scripts/shared/backend_i18n.js"></script>
    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/nav.js";
      await (window.__BACKEND_I18N_PROMISE || Promise.resolve());
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "tours" });
    </script>
    <script type="module" src="frontend/scripts/pages/tours_list.js"></script>
  </body>
</html>
