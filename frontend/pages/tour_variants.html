<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n-id="backend.tour_variants.heading">Tour Variants</title>
    <meta name="description" content="AsiaTravelPlan backend Tour Variants workspace" />
    <link rel="icon" href="/assets/img/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/assets/img/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" sizes="180x180" />
    <script>
      {
        const hostname = window.location.hostname;
        const isPrivateNetworkHost = /^(10\.|192\.168\.|172\.(1[6-9]|2\d|3[0-1])\.)/.test(hostname);
        const isLocalEnvironment = ["localhost", "127.0.0.1", "::1", "[::1]"].includes(hostname) || isPrivateNetworkHost;
        const isStagingEnvironment = hostname === "staging.asiatravelplan.com";
        const environmentIcon = isLocalEnvironment
          ? { href: "/assets/img/local.small.png", sizes: "200x200" }
          : isStagingEnvironment
            ? { href: "/assets/img/staging.small.png", sizes: "150x150" }
            : null;
        const environmentAppleTouchIcon = isLocalEnvironment
          ? { href: "/assets/img/local-home-screen-icon.png", sizes: "180x180" }
          : isStagingEnvironment
            ? { href: "/assets/img/staging-home-screen-icon.png", sizes: "180x180" }
            : null;
        if (environmentIcon) {
          document.querySelector('link[rel="icon"][sizes="32x32"]')?.setAttribute("href", environmentIcon.href);
          document.querySelector('link[rel="icon"][sizes="16x16"]')?.setAttribute("href", environmentIcon.href);
        }
        if (environmentAppleTouchIcon) {
          const appleTouchIcon = document.querySelector('link[rel="apple-touch-icon"]');
          appleTouchIcon?.setAttribute("href", environmentAppleTouchIcon.href);
          appleTouchIcon?.setAttribute("sizes", environmentAppleTouchIcon.sizes);
        }
      }
    </script>
    <script>
      if (!window.ASIATRAVELPLAN_API_BASE && ["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        window.ASIATRAVELPLAN_API_BASE = window.location.origin;
      }
    </script>
    <script>
      if (["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        const diagnosticsScript = document.createElement("script");
        diagnosticsScript.src = "/frontend/scripts/shared/localhost_diagnostics.js";
        document.head.append(diagnosticsScript);
      }
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <style>
      .tour-variants-controls {
        display: grid;
        gap: 1rem;
        margin-bottom: 1.25rem;
      }

      .tour-variants-controls__row {
        display: grid;
        gap: 1rem;
        grid-template-columns: minmax(12rem, 1fr) minmax(12rem, 1fr) auto auto;
        align-items: end;
      }

      .tour-variants-create {
        display: grid;
        gap: 1rem;
        grid-template-columns: minmax(18rem, 1fr) auto;
        align-items: end;
        padding: 1rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-muted);
      }

      .tour-variant-status {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.18rem 0.5rem;
        border-radius: 999px;
        font-size: var(--font-size-overline);
        font-weight: var(--font-weight-bold);
        line-height: 1.15;
        text-transform: lowercase;
      }

      .tour-variant-status--published {
        background: var(--success-surface-alpha);
        color: var(--success-text-deep);
      }

      .tour-variant-status--draft {
        background: var(--surface-muted);
        color: var(--text-muted-strong);
        border: 1px solid var(--line);
      }

      .backend-list-page #tourVariantsTable td {
        vertical-align: middle;
      }

      .backend-list-page #tourVariantsTable .tour-list__row--clickable {
        cursor: pointer;
        transition: background-color 160ms ease;
      }

      .backend-list-page #tourVariantsTable .tour-list__row--clickable:hover td,
      .backend-list-page #tourVariantsTable .tour-list__row--clickable:focus-visible td {
        background: rgba(242, 235, 222, 0.97);
      }

      .backend-list-page #tourVariantsTable .tour-list__row--clickable:focus-visible {
        outline: none;
      }

      .backend-list-page #tourVariantsTable .booking-list__meta-cell,
      .backend-list-page #tourVariantsTable .tour-list__updated-cell {
        white-space: nowrap;
      }

      .backend-list-page #tourVariantsTable .booking-list__plan-summary,
      .backend-list-page #tourVariantsTable .tour-list__updated-summary {
        display: grid;
        gap: 0.15rem;
      }

      .backend-list-page #tourVariantsTable .tour-list__updated-cell-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.65rem;
      }

      .backend-list-page #tourVariantsTable .booking-list__plan-primary,
      .backend-list-page #tourVariantsTable .tour-list__updated-primary {
        font-weight: 600;
        color: #173329;
      }

      .backend-list-page #tourVariantsTable .booking-list__plan-secondary,
      .backend-list-page #tourVariantsTable .booking-list__representative-name {
        color: #5f6b7a;
      }

      .backend-list-page #tourVariantsTable .booking-list__booking-name {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.45rem;
      }

      .backend-list-page #tourVariantsTable .tour-list__published-meta {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
      }

      .backend-list-page #tourVariantsTable .tour-list__published-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.18rem 0.5rem;
        border-radius: 999px;
        background: var(--success-surface-alpha);
        color: var(--success-text-deep);
        font-size: var(--font-size-overline);
        font-weight: var(--font-weight-bold);
        line-height: 1.15;
        text-transform: lowercase;
      }

      .backend-list-page #tourVariantsTable .tour-list__published-priority {
        color: var(--text-muted);
        font-size: var(--font-size-ui-sm);
        font-weight: var(--font-weight-semibold);
        line-height: 1.15;
      }

      .backend-list-page #tourVariantsTable .tour-list__updated-summary .tour-list__published-pill,
      .backend-list-page #tourVariantsTable .tour-list__updated-summary .tour-variant-status {
        justify-self: start;
      }

      .tour-variant-days {
        min-width: 7.5rem;
      }

      .tour-variant-status {
        justify-self: start;
      }

      .tour-variant-issues {
        max-width: 28rem;
        color: var(--danger-text);
      }

      @media (max-width: 820px) {
        .tour-variants-controls__row,
        .tour-variants-create {
          grid-template-columns: 1fr;
        }

        .backend-list-page #tourVariantsTable .booking-list__meta-cell,
        .backend-list-page #tourVariantsTable .tour-list__updated-cell {
          white-space: normal;
        }
      }
    </style>
  </head>
  <body class="backend-list-page backend-page-loading--busy">
    <div class="booking-page-overlay backend-page-loading-overlay" id="backendPageLoadingOverlay" aria-hidden="false">
      <div class="booking-page-overlay__panel" role="status" aria-live="assertive">
        <span class="booking-page-overlay__spinner" aria-hidden="true"></span>
        <span class="booking-page-overlay__text" id="backendPageLoadingOverlayText" data-i18n-id="backend.page_loading_overlay">Loading page content. Please wait.</span>
      </div>
    </div>

    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="bookings.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="/assets/generated/runtime/brand-logo-backoffice.png" alt="AsiaTravelPlan" width="165" height="68" />
        </a>
        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div id="backendError" class="backend-message" role="alert" aria-live="assertive"></div>

          <section class="backend-section">
            <div class="backend-section-head">
              <h1 data-i18n-id="backend.tour_variants.heading">Tour Variants</h1>
            </div>

            <div class="tour-variants-controls">
              <div class="tour-variants-create">
                <div class="field">
                  <label for="tourVariantsBaseTour" data-i18n-id="backend.tour_variants.base_marketing_tour">Base marketing tour</label>
                  <select id="tourVariantsBaseTour"></select>
                </div>
                <button class="btn btn-primary" id="tourVariantsCreateBtn" type="button" disabled data-i18n-id="backend.tour_variants.new_title">New Tour Variant</button>
              </div>

              <div class="tour-variants-controls__row">
                <div class="field">
                  <label for="tourVariantsSearch" data-i18n-id="common.search">Search</label>
                  <input id="tourVariantsSearch" type="text" />
                </div>
                <div class="field">
                  <label for="tourVariantsPublished" data-i18n-id="backend.tour_variants.publication">Publication</label>
                  <select id="tourVariantsPublished">
                    <option value="" data-i18n-id="common.all">All</option>
                    <option value="yes" data-i18n-id="backend.tour_variants.published">Published</option>
                    <option value="no" data-i18n-id="backend.tour_variants.draft">Draft</option>
                  </select>
                </div>
                <button class="btn btn-ghost" id="tourVariantsSearchBtn" type="button" data-i18n-id="common.search">Search</button>
                <button class="btn btn-ghost" id="tourVariantsClearBtn" type="button" data-i18n-id="common.clear">Clear</button>
              </div>
              <span id="tourVariantsStatus" class="micro" role="status" aria-live="polite"></span>
            </div>

            <div class="backend-table-wrap">
              <table class="backend-table tour-variants-table" id="tourVariantsTable"></table>
            </div>
            <div class="backend-pagination" id="tourVariantsPagination" aria-label="Tour Variants pagination" data-i18n-aria-label-id="backend.tour_variants.pagination_label"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="shared/generated/language_catalog.global.js"></script>
    <script src="frontend/scripts/shared/backend_i18n.js"></script>
    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/nav.js?v=20260518c";
      await (window.__BACKEND_I18N_PROMISE || Promise.resolve());
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "tour_variants" });
    </script>
    <script type="module" src="frontend/scripts/pages/tour_variants.js?v=20260518a"></script>
  </body>
</html>
