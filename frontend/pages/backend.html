<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AsiaTravelPlan Backend</title>
    <link rel="stylesheet" href="shared/css/styles.css?v=20260309a" />
  </head>
  <body class="backend-page">
    <header class="backend-header">
      <div id="backendNavMount"></div>
    </header>

    <main class="backend-layout backend-layout--wide">
      <section class="backend-section" id="dashboardPanel">
        <h1>Dashboard</h1>
        <div class="backend-stats-grid">
          <article class="backend-stat-card"><span class="micro">Bookings</span><strong id="dashboardBookingsCount">0</strong></article>
          <article class="backend-stat-card"><span class="micro">Searchable person records</span><strong id="dashboardCustomersCount">0</strong></article>
          <article class="backend-stat-card"><span class="micro">Tours</span><strong id="dashboardToursCount">0</strong></article>
        </div>
      </section>

      <section class="backend-section" id="bookingsPanel" hidden>
        <div class="backend-toolbar">
          <input id="bookingsSearch" type="text" placeholder="id, destination, person, email, phone..." />
          <button class="btn btn-ghost" id="bookingsSearchBtn" type="button">Search</button>
          <button class="btn btn-ghost" id="bookingsClearBtn" type="button">Clear Search</button>
          <span id="bookingsCountInfo" class="micro"></span>
        </div>
        <div class="backend-table-wrap">
          <table class="backend-table" id="bookingsTable"></table>
        </div>
        <div class="backend-pagination" id="bookingsPagination" aria-label="Bookings pagination"></div>
      </section>

      <section class="backend-section" id="customersPanel" hidden>
        <div class="backend-toolbar">
          <input id="customersSearch" type="text" placeholder="name, email, phone..." />
          <button class="btn btn-ghost" id="customersSearchBtn" type="button">Search</button>
          <button class="btn btn-ghost" id="customersClearBtn" type="button">Clear Search</button>
          <span id="customersCountInfo" class="micro"></span>
        </div>
        <p class="micro">Customer search finds bookings by the persons stored inside each booking.</p>
        <div class="backend-table-wrap">
          <table class="backend-table" id="customersTable"></table>
        </div>
        <div class="backend-pagination" id="customersPagination" aria-label="Customer search pagination"></div>
      </section>

      <section class="backend-section" id="toursPanel" hidden>
        <h1>Tours</h1>
        <p class="micro" id="toursCountInfo"></p>
        <div class="backend-table-wrap">
          <table class="backend-table" id="toursTable"></table>
        </div>
      </section>

      <section class="backend-section" id="settingsPanel" hidden>
        <h1>Reports / Settings</h1>
        <p class="micro">Settings remain booking-centric in this branch. ATP staff management and contract tools stay available through the backend API.</p>
      </section>
    </main>

    <script type="module" src="frontend/scripts/backend-page.js?v=20260309a"></script>
  </body>
</html>
