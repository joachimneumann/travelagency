<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n-id="backend.standard_tours.detail_title">Standard tour</title>
    <meta name="description" content="AsiaTravelPlan standard tour detail editor" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <script>
      if (!window.ASIATRAVELPLAN_API_BASE && ["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        window.ASIATRAVELPLAN_API_BASE = window.location.origin;
      }
    </script>
    <script src="/frontend/scripts/shared/localhost_diagnostics.js"></script>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <style>
      .standard-tour-detail-page .standard-tour-detail__form {
        display: grid;
        gap: 1rem;
      }

      .standard-tour-detail-page .standard-tour-detail__header {
        display: grid;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }

      .standard-tour-detail-page .standard-tour-detail__subtitle {
        margin: 0;
        color: var(--text-black-soft);
      }

      .standard-tour-detail-page .standard-tour-detail__destinations .filter-checkbox-list {
        min-width: 0;
        max-height: none;
        padding: 0.85rem 1rem;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 18px;
        background: rgba(248, 250, 252, 0.95);
      }

      .standard-tour-detail-page #travel_plan_panel {
        grid-column: 1 / -1;
        width: 100%;
      }
    </style>
  </head>
  <body class="booking-detail-page standard-tour-detail-page">
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="bookings.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="/assets/generated/runtime/brand-logo.png" alt="AsiaTravelPlan" width="320" height="76" />
        </a>

        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div class="booking-detail-page__bar-top-gap" aria-hidden="true"></div>
          <div class="booking-dirty-bar-row">
            <div class="booking-dirty-bar" id="booking_dirty_bar">
              <div class="booking-dirty-bar__panel">
                <div class="booking-dirty-bar__copy">
                  <strong id="booking_dirty_bar_title">No unsaved edits</strong>
                  <span class="micro booking-dirty-bar__summary" id="booking_dirty_bar_summary"></span>
                </div>
                <div class="booking-dirty-bar__actions">
                  <button class="btn btn-ghost" id="booking_discard_edits_btn" type="button">Discard</button>
                  <button class="btn btn-primary" id="booking_save_edits_btn" type="button">Save</button>
                  <span class="micro booking-dirty-bar__action-error" id="booking_save_error_hint" aria-live="polite"></span>
                </div>
              </div>
            </div>
            <button class="booking-dirty-bar-row__back" id="backToBackend" type="button" aria-label="Back to standard tours">Back</button>
          </div>
          <div class="booking-detail-page__bar-gap" aria-hidden="true"></div>
          <div class="booking-detail-page__scroll">
            <div class="booking-page-shell">
              <div class="standard-tour-detail__header">
                <h1 class="section-title" id="standardTourHeading" data-i18n-id="backend.standard_tours.detail_heading">Standard tour</h1>
                <p class="standard-tour-detail__subtitle" id="standardTourSubtitle" data-i18n-id="backend.standard_tours.detail_loading">Loading standard tour...</p>
              </div>

              <div id="standardTourError" class="backend-message" role="alert" aria-live="assertive"></div>

              <form id="standardTourForm" class="standard-tour-detail__form backend-tour-form">
                <div class="field full">
                  <label for="standardTourTitleInput" data-i18n-id="backend.standard_tours.form.title">Title</label>
                  <input id="standardTourTitleInput" name="title" type="text" autocomplete="off" required />
                </div>

                <div class="field full standard-tour-detail__destinations">
                  <span class="field-label" data-i18n-id="backend.standard_tours.form.destinations">Destinations</span>
                  <div id="standardTourDestinationsInput" class="filter-checkbox-list" role="group" aria-label="Standard tour destinations"></div>
                </div>

                <article id="travel_plan_panel" class="booking-section is-open">
                  <div class="booking-section__head">
                    <button class="booking-section__summary booking-section__summary--inline-pad-16" id="travel_plan_panel_summary" type="button"></button>
                  </div>
                  <div class="booking-section__body">
                    <div class="backend-controls travel-plan-actions">
                      <span id="travel_plan_status" class="micro booking-inline-status"></span>
                    </div>
                    <div id="travel_plan_editor"></div>
                  </div>
                </article>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="shared/generated/language_catalog.global.js"></script>
    <script src="frontend/scripts/shared/backend_i18n.js"></script>
    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/nav.js";
      await (window.__BACKEND_I18N_PROMISE || Promise.resolve());
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "standard-tours" });
    </script>
    <script type="module" src="frontend/scripts/pages/standard_tour.js"></script>
  </body>
</html>
