<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n-id="nav.settings">Reports and Settings</title>
    <meta name="description" content="AsiaTravelPlan backend settings workspace" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <script>
      if (!window.ASIATRAVELPLAN_API_BASE && ["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        window.ASIATRAVELPLAN_API_BASE = "http://localhost:8787";
      }
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="backend-list-page">
    <header class="header" id="top">
      <div class="container header-wrap">
        <a class="brand" id="backendHomeLink" href="backend.html" aria-label="AsiaTravelPlan backend home">
          <img class="brand-logo" src="assets/img/logo-asiatravelplan.svg" alt="AsiaTravelPlan" width="320" height="76" />
        </a>

        <div id="backendNavMount"></div>
      </div>
    </header>

    <main id="main-content">
      <section class="section">
        <div class="container">
          <div id="backendError" class="backend-message" role="alert" aria-live="assertive"></div>

          <section class="backend-section" id="settingsPanel">
            <h2 class="section-title u-title-medium" data-i18n-id="backend.users.heading">Users</h2>
            <p class="micro" id="staffStatus" data-i18n-id="backend.users.status">Users are managed in Keycloak.</p>
            <div class="backend-table-wrap">
              <table class="backend-table" id="staffTable"></table>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="shared/generated/language_catalog.global.js"></script>
    <script src="frontend/scripts/shared/backend_i18n.js"></script>
    <script type="module">
      import { mountBackendNav } from "./frontend/scripts/shared/nav.js";
      await (window.__BACKEND_I18N_PROMISE || Promise.resolve());
      mountBackendNav(document.getElementById("backendNavMount"), { currentSection: "settings" });
    </script>
    <script type="module" src="frontend/scripts/pages/settings_list.js"></script>
  </body>
</html>
