<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found | AsiaTravelPlan</title>
    <meta name="description" content="The page you requested could not be found." />
    <link rel="icon" href="/assets/img/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/assets/img/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" sizes="180x180" />
    <script>
      if (["localhost", "127.0.0.1"].includes(window.location.hostname)) {
        const localIconHref = "/assets/img/local.small.png";
        document.querySelector('link[rel="icon"][sizes="32x32"]')?.setAttribute("href", localIconHref);
        document.querySelector('link[rel="icon"][sizes="16x16"]')?.setAttribute("href", localIconHref);
        document.querySelector('link[rel="apple-touch-icon"]')?.setAttribute("href", localIconHref);
        document.querySelector('link[rel="apple-touch-icon"]')?.setAttribute("sizes", "200x200");
      }
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="not-found-page">
    <main class="not-found-shell">
      <section class="not-found-grid">
        <figure class="not-found-visual">
          <img src="assets/img/404.png" alt="missing page" width="864" height="578" />
        </figure>
        <section class="not-found-copy">
          <p class="not-found-booking">
            The page you are looking for is no longer here, or the address is incorrect.
          </p>
          <div class="not-found-actions">
            <a class="btn btn-primary" href="/">Back to homepage</a>
            <a class="btn btn-secondary" href="mailto:info@asiatravelplan.com">Email us</a>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
